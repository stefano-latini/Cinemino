<style>
:root {
  --bg: #f6f1e8;
  --bg-elev: #fdf9f2;
  --ink: #1a1410;
  --ink-soft: #4a3f36;
  --muted: #8a7d6e;
  --line: #e4d7bf;
  --line-strong: #d4c4a8;
  --accent: #8b1a1a;
  --accent-soft: #b04040;
  --accent-bg: #f3e4e4;
  --heart: #c42b2b;
  --watch: #2a6b3a;
  --watch-bg: #e4f3e4;
  --success: #4a6b3a;
  --avatar-bg: linear-gradient(145deg, #3a2820, #1f1410);
  --avatar-fg: #e4c888;
  --shadow-sm: 0 1px 2px rgba(26,20,16,.06);
  --shadow: 0 4px 16px rgba(26,20,16,.08);
  --shadow-lg: 0 20px 50px rgba(26,20,16,.18);
  --r-sm: 8px;
  --r: 12px;
  --r-lg: 18px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #14100d;
    --bg-elev: #1d1814;
    --ink: #f1ead9;
    --ink-soft: #c8bca6;
    --muted: #8a7d6e;
    --line: #2d2520;
    --line-strong: #3d342c;
    --accent: #d44545;
    --accent-soft: #e36868;
    --accent-bg: #3a1818;
    --heart: #e64545;
    --watch: #4a9b5a;
    --watch-bg: #1a3a22;
    --avatar-bg: linear-gradient(145deg, #4a3225, #28180f);
    --avatar-fg: #e4c888;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
    --shadow: 0 4px 16px rgba(0,0,0,.5);
    --shadow-lg: 0 20px 50px rgba(0,0,0,.65);
  }
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); overscroll-behavior-y: none; }
body {
  font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  min-height: 100dvh;
}
button, input, textarea, select { font: inherit; color: inherit; }
button { background: none; border: 0; cursor: pointer; padding: 0; }
input, textarea { -webkit-appearance: none; appearance: none; }

.brand-serif { font-family: 'Fraunces', 'Times New Roman', serif; font-optical-sizing: auto; }

.app {
  max-width: 560px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  position: relative;
  padding-bottom: calc(24px + var(--safe-bot));
}

.header {
  position: sticky;
  top: 0;
  z-index: 30;
  background: var(--bg);
  padding-top: var(--safe-top);
  border-bottom: 1px solid var(--line);
}
.header-inner {
  padding: 14px 18px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.brand {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 28px;
  letter-spacing: -0.015em;
  font-variation-settings: "opsz" 72, "SOFT" 30;
  color: var(--ink);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.brand-mark {
  width: 30px;
  height: 30px;
  flex-shrink: 0;
  display: block;
}
@media (prefers-color-scheme: dark) {
  .brand-mark { filter: brightness(1.45) saturate(1.1); }
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 4px;
}
.icon-btn {
  width: 40px; height: 40px;
  border-radius: 999px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--ink);
  transition: background .15s;
}
.icon-btn:hover, .icon-btn:active { background: var(--line); }
.icon-btn svg { width: 20px; height: 20px; }
.icon-btn.icon-btn-primary {
  background: var(--accent);
  color: var(--bg);
}
.icon-btn.icon-btn-primary:hover,
.icon-btn.icon-btn-primary:active { background: var(--accent-soft); }
.icon-btn.icon-btn-primary svg { width: 22px; height: 22px; color: var(--bg); stroke: var(--bg); }

.tabs {
  display: flex;
  padding: 0 14px;
  gap: 4px;
}
.tab {
  flex: 1;
  padding: 10px 12px 12px;
  font-size: 14px;
  font-weight: 500;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  text-align: center;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: color .15s, border-color .15s;
}
.tab-count {
  font-size: 11px;
  background: var(--line);
  color: var(--ink-soft);
  padding: 1px 7px;
  border-radius: 999px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.tab.active { color: var(--ink); border-bottom-color: var(--accent); }
.tab.active .tab-count { background: var(--accent); color: var(--bg); }

.toolbar {
  display: flex; gap: 8px; align-items: center;
  padding: 12px 16px 10px;
}
.search-box {
  flex: 1;
  position: relative;
}
.search-box input {
  width: 100%;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 10px 14px 10px 38px;
  font-size: 14px;
  outline: none;
  transition: border-color .15s;
}
.search-box input:focus { border-color: var(--accent-soft); }
.search-box svg {
  position: absolute;
  left: 12px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; color: var(--muted);
}
.chip-btn {
  padding: 9px 12px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--bg-elev);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-soft);
  display: inline-flex; align-items: center; gap: 5px;
  white-space: nowrap;
  transition: all .15s;
}
.chip-btn.active {
  background: var(--accent-bg);
  border-color: var(--accent-soft);
  color: var(--accent);
}
.chip-btn svg { width: 14px; height: 14px; }

.list { padding: 4px 12px 20px; }
.card {
  display: flex;
  gap: 14px;
  padding: 14px 12px;
  border-bottom: 1px solid var(--line);
  align-items: center;
  cursor: pointer;
  transition: background .15s;
}
.card:hover { background: var(--bg-elev); }
.card-body { flex: 1; min-width: 0; }
.card-title {
  font-weight: 600;
  font-size: 17px;
  color: var(--ink);
  line-height: 1.25;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  letter-spacing: -0.005em;
}
.card-meta {
  font-size: 13px;
  color: var(--ink-soft);
  margin-top: 4px;
  display: flex; gap: 6px; align-items: center;
  font-variant-numeric: tabular-nums;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.card-meta .year { font-weight: 500; }
.card-meta .dot { color: var(--line-strong); }
.card-meta .dir { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-style: italic; font-family: 'Fraunces', serif; color: var(--muted); }
.card-meta .rec { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--watch); font-weight: 500; }
.card-heart {
  flex-shrink: 0;
  padding: 8px;
  margin: -8px -4px -8px 0;
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
}
.card-heart svg { width: 20px; height: 20px; transition: transform .15s; }
.card-heart.on { color: var(--heart); }
.card-heart.on svg { transform: scale(1.08); }
.card-heart:active svg { transform: scale(.85); }
.card-check {
  flex-shrink: 0;
  padding: 8px;
  margin: -8px -4px -8px 0;
  color: var(--watch);
  display: flex; align-items: center; justify-content: center;
  border-radius: 999px;
  transition: background .15s;
}
.card-check:hover, .card-check:active { background: var(--watch-bg); }
.card-check svg { width: 22px; height: 22px; }

.empty {
  text-align: center;
  padding: 60px 30px;
  color: var(--muted);
}
.empty-title {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 20px;
  color: var(--ink-soft);
  margin-bottom: 6px;
}

.backdrop {
  position: fixed; inset: 0;
  background: rgba(26,20,16,.45);
  z-index: 100;
  opacity: 0;
  animation: fadeIn .18s forwards;
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
}
@keyframes fadeIn { to { opacity: 1; } }
.sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  background: var(--bg);
  border-radius: 22px 22px 0 0;
  z-index: 101;
  max-width: 560px;
  margin: 0 auto;
  max-height: 92dvh;
  max-height: 92vh;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  animation: slideUp .26s cubic-bezier(.2,.7,.2,1) forwards;
  padding-bottom: var(--safe-bot);
  box-shadow: 0 -10px 40px rgba(0,0,0,.2);
}
@keyframes slideUp { to { transform: translateY(0); } }
.sheet-handle {
  width: 38px; height: 4px;
  background: var(--line-strong);
  border-radius: 999px;
  margin: 9px auto 4px;
  flex-shrink: 0;
}
.sheet-header {
  padding: 6px 18px 14px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.sheet-title {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 22px;
  font-weight: 600;
}
.sheet-body { padding: 16px 18px 20px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
.sheet-footer {
  padding: 12px 18px calc(16px + var(--safe-bot));
  border-top: 1px solid var(--line);
  display: flex; gap: 10px;
  flex-shrink: 0;
  background: var(--bg);
}

.page {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 110;
  display: flex; flex-direction: column;
  max-width: 560px;
  margin: 0 auto;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bot);
  animation: pageSlideIn .22s cubic-bezier(.2,.7,.2,1);
}
@keyframes pageSlideIn { from { transform: translateX(8%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.page-header {
  padding: 10px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
  background: var(--bg);
}

<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const SEED = [];
const STORAGE_KEY = "cinemino.v1";

function loadItems() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return null;
    const seen = new Set();
    return parsed.filter(it => it && typeof it === "object" && it.title).map(it => {
      if (!it.id || seen.has(it.id)) {
        const newId = uid();
        seen.add(newId);
        return { ...it, id: newId };
      }
      seen.add(it.id);
      return it;
    });
  } catch (e) { }
  return null;
}
function saveItems(items) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }
  catch (e) { }
}

let __uidCounter = 0;
const uid = () => "l-" + Date.now().toString(36) + "-" + (++__uidCounter).toString(36) + "-" + Math.random().toString(36).slice(2,8);
const norm = (s) => (s||"").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");

function csvEscape(v) {
  if (v == null) return "";
  const s = String(v);
  if (/[",\n]/.test(s)) return `"${s.replace(/"/g,'""')}"`; 
  return s;
}

function parseCSV(text) {
  const rows = [];
  let row = [], field = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"') { if (text[i+1] === '"') { field += '"'; i++; } else inQ = false; }
      else field += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(field); field = ""; }
      else if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ""; }
      else if (ch === '\r') { }
      else field += ch;
    }
  }
  if (field.length || row.length > 0) {
    row.push(field);
    if (!(row.length === 1 && row[0] === "")) rows.push(row);
  }
  return rows;
}

async function fetchWikidataSuggestions(query) {
  const safe = query.replace(/\\/g, "\\\\").replace(/"/g, '\\"');
  const sparql = `SELECT ?item ?itemLabel ?year (GROUP_CONCAT(DISTINCT ?dirName; separator=", ") AS ?directors) ?imdb WHERE {
  SERVICE wikibase:mwapi {
    bd:serviceParam wikibase:endpoint "www.wikidata.org" .
    bd:serviceParam wikibase:api "EntitySearch" .
    bd:serviceParam mwapi:search "${safe}" .
    bd:serviceParam mwapi:language "it" .
    ?item wikibase:apiOutputItem mwapi:item .
  }
  ?item wdt:P31/wdt:P279* wd:Q11424 .
  OPTIONAL { ?item wdt:P577 ?date . BIND(YEAR(?date) AS ?year) }
  OPTIONAL {
    ?item wdt:P57 ?dir .
    ?dir rdfs:label ?dirLabel .
    FILTER(LANG(?dirLabel) = "it" || LANG(?dirLabel) = "en")
    BIND(STR(?dirLabel) AS ?dirName)
  }
  OPTIONAL { ?item wdt:P345 ?imdb }
  SERVICE wikibase:label { bd:serviceParam wikibase:language "it,en" . ?item rdfs:label ?itemLabel . }
}
GROUP BY ?item ?itemLabel ?year ?imdb
ORDER BY DESC(?year)
LIMIT 12`;
  const url = `https://query.wikidata.org/sparql?format=json&query=${encodeURIComponent(sparql)}`;
  try {
    const r = await fetch(url, { headers: { "Accept": "application/sparql-results+json" } });
    if (!r.ok) return [];
    const data = await r.json();
    const seen = new Set();
    const out = [];
    for (const b of data.results?.bindings || []) {
      const qid = (b.item?.value || "").split("/").pop();
      if (!qid || seen.has(qid)) continue;
      seen.add(qid);
      let directors = b.directors?.value || "";
      if (directors) {
        const dseen = new Set();
        directors = directors.split(",").map(s => s.trim()).filter(s => {
          const k = s.toLowerCase();
          if (!s || dseen.has(k)) return false;
          dseen.add(k); return true;
        }).join(", ");
      }
      out.push({
        id: b.imdb?.value || qid,
        imdbId: b.imdb?.value || "",
        qid,
        title: b.itemLabel?.value || "",
        year: b.year?.value ? parseInt(b.year.value, 10) : null,
        directors,
        source: "wikidata"
      });
    }
    return out.slice(0, 10);
  } catch (e) {
    return [];
  }
}

async function fetchImdbSuggestions(query) {
  const q = query.trim().toLowerCase().replace(/[^a-z0-9\s]/gi, "").replace(/\s+/g, "_");
  if (!q) return [];
  const letter = q[0];
  const url = `https://v3.sg.media-imdb.com/suggestion/${letter}/${encodeURIComponent(q)}.json`;
  try {
    const r = await fetch(url);
    if (!r.ok) return [];
    const data = await r.json();
    const items = (data.d || []).filter(d => {
      const qq = (d.qid || d.q || "").toLowerCase();
      return /movie|short|tv|video|mini|feature|series/i.test(qq) || d.q === "feature";
    });
    return items.slice(0, 10).map(d => ({
      id: d.id,
      imdbId: d.id,
      qid: null,
      title: d.l || "",
      year: d.y || (d.yr ? parseInt(d.yr, 10) : null),
      directors: "",
      stars: d.s || "",
      source: "imdb"
    }));
  } catch (e) {
    return [];
  }
}

async function searchFilms(query) {
  const wd = await fetchWikidataSuggestions(query);
  if (wd.length >= 3) return { results: wd, source: "wikidata" };
  const imdb = await fetchImdbSuggestions(query);
  const seen = new Set(wd.map(r => r.imdbId).filter(Boolean));
  const merged = [...wd];
  for (const it of imdb) {
    if (!it.imdbId || !seen.has(it.imdbId)) {
      merged.push(it);
      if (it.imdbId) seen.add(it.imdbId);
    }
  }
  return { results: merged.slice(0, 10), source: merged.length ? "mixed" : "none" };
}

async function fetchDirectorFromWikidata(imdbId) {
  if (!imdbId) return null;
  const sparql = `SELECT (GROUP_CONCAT(DISTINCT ?name; separator=", ") AS ?directors) WHERE {
    ?film wdt:P345 "${imdbId}" .
    ?film wdt:P57 ?dir .
    ?dir rdfs:label ?label .
    FILTER(LANG(?label) = "it" || LANG(?label) = "en")
    BIND(STR(?label) AS ?name)
  }`;
  const url = `https://query.wikidata.org/sparql?format=json&query=${encodeURIComponent(sparql)}`;
  try {
    const r = await fetch(url, { headers: { "Accept": "application/sparql-results+json" } });
    if (!r.ok) return null;
    const data = await r.json();
    const v = data.results?.bindings?.[0]?.directors?.value;
    if (!v) return null;
    const seen = new Set();
    return v.split(",").map(s => s.trim()).filter(s => {
      const k = s.toLowerCase();
      if (!s || seen.has(k)) return false;
      seen.add(k); return true;
    }).join(", ");
  } catch (e) {
    return null;
  }
}

function useDebounced(value, delay) {
  const [v, setV] = useState(value);
  useEffect(() => {
    const id = setTimeout(() => setV(value), delay);
    return () => clearTimeout(id);
  }, [value, delay]);
  return v;
}

const Icon = {
  Search: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>,
  Plus: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>,
  Heart: ({filled}) => <svg viewBox="0 0 24 24" fill={filled?"currentColor":"none"} stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><path d="M12 21s-7-4.5-9.5-9A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6C19 16.5 12 21 12 21z"/></svg>,
  Check: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>,
  Eye: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
  Menu: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>,
  Close: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>,
  Download: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v13M6 11l6 6 6-6M4 21h16"/></svg>,
  Upload: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 19V6M6 11l6-6 6 6M4 21h16"/></svg>,
  Trash: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>,
  Chart: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>,
  Sparkle: () => <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.8 4.8L18 8l-4.2 1.7L12 14l-1.8-4.3L6 8l4.2-1.2z"/></svg>,
  Chevron: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 6 6 6-6 6"/></svg>,
  Sort: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h13M3 12h9M3 18h5M17 4v16M17 20l-3-3M17 20l3-3"/></svg>,
  Person: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>,
};

function isDaVedere(i) {
  return (i.type || "").toLowerCase().includes("da vedere");
}

function App() {
  const [items, setItems] = useState(() => loadItems() || SEED);
  const [tab, setTab] = useState("film");
  const [query, setQuery] = useState("");
  const [favOnly, setFavOnly] = useState(false);
  const [sortMode, setSortMode] = useState("anno");
  const [editOpen, setEditOpen] = useState(false);
  const [editing, setEditing] = useState(null);
  const [detailItem, setDetailItem] = useState(null);
  const [menuOpen, setMenuOpen] = useState(false);
  const [statsOpen, setStatsOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const fileInputRef = useRef(null);

  useEffect(() => { saveItems(items); }, [items]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2200);
  };

  const films = useMemo(() => items.filter(i => !isDaVedere(i)), [items]);
  const davedere = useMemo(() => items.filter(i => isDaVedere(i)), [items]);

  const visible = useMemo(() => {
    const base = tab === "film" ? films : davedere;
    const q = norm(query);
    let out = base;
    if (tab === "film" && favOnly) out = out.filter(i => i.favorite);
    if (q) out = out.filter(i =>
      norm(i.title).includes(q) ||
      norm(i.originalTitle).includes(q) ||
      norm(i.directors).includes(q) ||
      norm(i.recommendedBy).includes(q)
    );
    const titleCmp = (a, b) => norm(a.title).localeCompare(norm(b.title), "it");
    if (sortMode === "anno") {
      return [...out].sort((a, b) => (b.year || 0) - (a.year || 0) || titleCmp(a, b));
    }
    if (sortMode === "alfa") {
      return [...out].sort(titleCmp);
    }
    return [...out].sort((a,b) => {
      if ((b.favorite?1:0) !== (a.favorite?1:0)) return (b.favorite?1:0) - (a.favorite?1:0);
      const da = a.createdAt || "", db = b.createdAt || "";
      if (da !== db) return db.localeCompare(da);
      return (b.year||0) - (a.year||0);
    });
  }, [tab, films, davedere, query, favOnly, sortMode]);

  const openAdd = () => { setEditing(null); setEditOpen(true); };
  const openDetail = (item) => { setDetailItem(item); };
  const closeDetail = () => { setDetailItem(null); };
  const openEditFromDetail = () => {
    setEditing(detailItem);
    setEditOpen(true);
  };
  const closeEdit = () => { setEditOpen(false); setEditing(null); };

  const saveItem = (data) => {
    if (data.id) {
      setItems(prev => prev.map(i => i.id === data.id ? { ...i, ...data, id: i.id } : i));
      setDetailItem(prev => prev && prev.id === data.id ? { ...prev, ...data, id: prev.id } : prev);
      showToast("Modifiche salvate");
    } else {
      if (data.imdbId) {
        const dup = items.find(i => i.imdbId && i.imdbId === data.imdbId);
        if (dup) {
          if (!confirm(`"${dup.title}" è già nella tua libreria. Aggiungere comunque?`)) {
            closeEdit();
            return;
          }
        }
      }
      const newItem = {
        ...data,
        id: uid(),
        favorite: !!data.favorite,
        createdAt: new Date().toISOString().slice(0,10),
        type: data.isDaVedere ? "Da vedere" : "Film",
      };
      delete newItem.isDaVedere;
      setItems(prev => [newItem, ...prev]);
      showToast(data.isDaVedere ? "Aggiunto alla lista" : "Film aggiunto");
      setTab(data.isDaVedere ? "davedere" : "film");
    }
    closeEdit();
  };

  const deleteItem = (id) => {
    if (!id) { closeEdit(); return; }
    setItems(prev => prev.filter(i => i.id !== id));
    closeEdit();
    closeDetail();
    showToast("Eliminato");
  };

  const markAsWatched = (item) => {
    setItems(prev => prev.map(i =>
      i.id === item.id ? { ...i, type: "Film", recommendedBy: i.recommendedBy || "" } : i
    ));
    closeDetail();
    setTab("film");
    showToast(`"${item.title}" spostato tra i film visti`);
  };

  const toggleFavInDetail = () => {
    if (!detailItem) return;
    setItems(prev => prev.map(i => i.id === detailItem.id ? { ...i, favorite: !i.favorite } : i));
    setDetailItem(prev => prev ? { ...prev, favorite: !prev.favorite } : prev);
  };

  const toggleFav = (id) => {
    setItems(prev => prev.map(i => i.id === id ? { ...i, favorite: !i.favorite } : i));
  };

  const exportCSV = () => {
    const head = ["Tipo","Titolo","Titolo originale","Anno","Regia","Generi","Durata (min)","IMDb","IMDb ID","Preferito","Consigliato da","Aggiunto il"];
    const rows = items.map(i => [
      isDaVedere(i) ? "Da vedere" : "Film",
      i.title, i.originalTitle, i.year, i.directors, i.genres, i.runtime,
      i.imdbRating, i.imdbId, i.favorite ? "si" : "",
      i.recommendedBy || "", i.createdAt || ""
    ].map(csvEscape).join(","));
    const csv = [head.join(","), ...rows].join("\n");
    downloadBlob(csv, "cinemino.csv", "text/csv;charset=utf-8");
    setMenuOpen(false);
    showToast("CSV esportato");
  };

  const exportPDF = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "pt", format: "a4" });
    const w = doc.internal.pageSize.getWidth();
    const h = doc.internal.pageSize.getHeight();
    const margin = 40;
    let y = margin;

    doc.setFont("times", "italic");
    doc.setFontSize(26);
    doc.text("Cinemino", margin, y); y += 22;
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.setTextColor(120);
    doc.text(`${films.length} film visti · ${davedere.length} da vedere · ${items.filter(i=>i.favorite).length} preferiti`, margin, y);
    doc.text(new Date().toLocaleDateString("it-IT"), w - margin, y, { align: "right" });
    y += 18;
    doc.setDrawColor(200); doc.line(margin, y, w - margin, y); y += 14;
    doc.setTextColor(30);

    const sections = [
      { label: "FILM VISTI", data: [...films].sort((a,b)=>(b.year||0)-(a.year||0)) },
      { label: "DA VEDERE", data: [...davedere].sort((a,b)=>(b.year||0)-(a.year||0)) },
    ];

    for (const sec of sections) {
      if (!sec.data.length) continue;
      if (y > h - margin - 30) { doc.addPage(); y = margin; }
      doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(139,26,26);
      doc.text(sec.label, margin, y); y += 14;
      doc.setTextColor(30);
      for (const it of sec.data) {
        if (y > h - margin - 20) { doc.addPage(); y = margin; }
        const prefix = it.favorite ? "* " : "  ";
        doc.setFont("helvetica","bold"); doc.setFontSize(10);
        const titleLine = `${prefix}${it.title}${it.year?" ("+it.year+")":""}`;
        const titleLines = doc.splitTextToSize(titleLine, w - 2*margin);
        doc.text(titleLines, margin, y);
        y += titleLines.length * 12;
        let subParts = [];
        if (it.directors) subParts.push(it.directors);
        if (it.originalTitle && it.originalTitle !== it.title) subParts.push(it.originalTitle);
        if (it.recommendedBy) subParts.push("Cons. da: " + it.recommendedBy);
        if (subParts.length) {
          doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(120);
          const subLines = doc.splitTextToSize(subParts.join(" · "), w - 2*margin);
          doc.text(subLines, margin, y);
          y += subLines.length * 11;
          doc.setTextColor(30);
        }
        y += 4;
      }
      y += 8;
    }
    doc.save("cinemino.pdf");
    setMenuOpen(false);
    showToast("PDF esportato");
  };

  const handleImport = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const text = reader.result;
      const trimmed = text.trim();
      const looksJson = trimmed.startsWith("[") || trimmed.startsWith("{");
      try {
        if (looksJson) {
          const parsed = JSON.parse(trimmed);
          const arr = Array.isArray(parsed) ? parsed : (Array.isArray(parsed.items) ? parsed.items : null);
          if (!arr) throw new Error("formato JSON non riconosciuto");
          let imported = 0, skipped = 0;
          const existingImdb = new Set(items.map(i => i.imdbId).filter(Boolean));
          const existingIds = new Set(items.map(i => i.id).filter(Boolean));
          const toAdd = [];
          for (const it of arr) {
            if (!it || !it.title) continue;
            const imdbId = it.imdbId || it.imdb_id || it.imdb || "";
            if (imdbId && existingImdb.has(imdbId)) { skipped++; continue; }
            let id = it.id || imdbId || uid();
            if (existingIds.has(id)) id = uid();
            existingIds.add(id);
            toAdd.push({
              id, imdbId,
              qid: it.qid || "",
              title: it.title || "",
              originalTitle: it.originalTitle || it.original_title || "",
              year: it.year ? parseInt(it.year, 10) : null,
              directors: it.directors || it.director || "",
              genres: it.genres || "",
              runtime: it.runtime ? parseInt(it.runtime, 10) : null,
              imdbRating: it.imdbRating ? parseFloat(it.imdbRating) : null,
              createdAt: it.createdAt || new Date().toISOString().slice(0,10),
              type: it.type || "Film",
              favorite: !!it.favorite,
              recommendedBy: it.recommendedBy || "",
            });
            if (imdbId) existingImdb.add(imdbId);
            imported++;
          }
          setItems(prev => [...toAdd, ...prev]);
          showToast(`Importati ${imported}${skipped?`, ${skipped} già presenti`:""}`);
        } else {
          const rows = parseCSV(text);
          if (!rows.length) throw new Error("vuoto");
          const header = rows[0].map(h => h.trim());
          const idx = (name) => header.findIndex(h => h.toLowerCase() === name.toLowerCase());
          const imdbIdx = idx("Const") >= 0 ? idx("Const") : idx("IMDb ID");
          const titleIdx = idx("Title") >= 0 ? idx("Title") : idx("Titolo");
          const origIdx = idx("Original Title") >= 0 ? idx("Original Title") : idx("Titolo originale");
          const yearIdx = idx("Year") >= 0 ? idx("Year") : idx("Anno");
          const dirIdx = idx("Directors") >= 0 ? idx("Directors") : idx("Regia");
          const genIdx = idx("Genres") >= 0 ? idx("Genres") : idx("Generi");
          const typeIdx = idx("Title Type") >= 0 ? idx("Title Type") : idx("Tipo");
          const runIdx = idx("Runtime (mins)") >= 0 ? idx("Runtime (mins)") : idx("Durata (min)");
          const ratingIdx = idx("IMDb Rating") >= 0 ? idx("IMDb Rating") : idx("IMDb");
          const createdIdx = idx("Created") >= 0 ? idx("Created") : idx("Aggiunto il");
          const favIdx = idx("Preferito");
          const recIdx = idx("Consigliato da");
          if (titleIdx < 0) throw new Error("colonna Title mancante");
          let imported = 0, skipped = 0;
          const existingImdb = new Set(items.map(i => i.imdbId).filter(Boolean));
          const existingIds = new Set(items.map(i => i.id).filter(Boolean));
          const toAdd = [];
          for (let r = 1; r < rows.length; r++) {
            const row = rows[r];
            if (!row || !row[titleIdx]) continue;
            const imdbId = imdbIdx >= 0 ? row[imdbIdx] : "";
            if (imdbId && existingImdb.has(imdbId)) { skipped++; continue; }
            let id = imdbId || uid();
            if (existingIds.has(id)) id = uid();
            existingIds.add(id);
            toAdd.push({
              id, imdbId,
              title: row[titleIdx] || "",
              originalTitle: origIdx >= 0 ? row[origIdx] : "",
              year: yearIdx >= 0 && row[yearIdx] ? parseInt(row[yearIdx], 10) : null,
              directors: dirIdx >= 0 ? row[dirIdx] : "",
              genres: genIdx >= 0 ? row[genIdx] : "",
              runtime: runIdx >= 0 && row[runIdx] ? parseInt(row[runIdx], 10) : null,
              imdbRating: ratingIdx >= 0 && row[ratingIdx] ? parseFloat(row[ratingIdx]) : null,
              createdAt: createdIdx >= 0 ? row[createdIdx] : new Date().toISOString().slice(0,10),
              type: typeIdx >= 0 ? row[typeIdx] : "Film",
              favorite: favIdx >= 0 ? /^(si|sì|yes|true|1)$/i.test(row[favIdx] || "") : false,
              recommendedBy: recIdx >= 0 ? row[recIdx] : "",
            });
            if (imdbId) existingImdb.add(imdbId);
            imported++;
          }
          setItems(prev => [...toAdd, ...prev]);
          showToast(`Importati ${imported}${skipped?`, ${skipped} già presenti`:""}`);
        }
      } catch (err) {
        console.error(err);
        showToast("Errore nell'importazione: " + err.message);
      }
    };
    reader.readAsText(file, "utf-8");
    e.target.value = "";
    setMenuOpen(false);
  };

  const exportJSON = () => {
    const json = JSON.stringify(items, null, 2);
    downloadBlob(json, "cinemino.json", "application/json;charset=utf-8");
    setMenuOpen(false);
    showToast("JSON esportato");
  };

  const resetAll = () => {
    if (!confirm("Svuotare la libreria? Verranno eliminati tutti i titoli. L'azione è irreversibile.")) return;
    setItems([]);
    setMenuOpen(false);
    showToast("Libreria svuotata");
  };

  return (
    <div className="app">
      <Header onMenu={() => setMenuOpen(true)} onAdd={openAdd} />
      <Tabs tab={tab} setTab={setTab} filmCount={films.length} davedereCount={davedere.length} />
      <Toolbar
        query={query} setQuery={setQuery}
        favOnly={favOnly} setFavOnly={setFavOnly}
        sortMode={sortMode} setSortMode={setSortMode}
        showFavFilter={tab === "film"}
      />

      {visible.length === 0 ? (
        <div className="no-results">
          {query || favOnly
            ? "Nessun risultato"
            : tab === "film"
              ? "Nessun film ancora."
              : "Nessun film in lista. Aggiungine uno!"}
        </div>
      ) : (
        <div className="list">
          {visible.map(it => (
            <ItemCard
              key={it.id}
              item={it}
              onClick={() => openDetail(it)}
              onFav={() => toggleFav(it.id)}
              onCheck={() => markAsWatched(it)}
            />
          ))}
        </div>
      )}

      {detailItem && !editOpen && (
        <DetailView
          item={detailItem}
          onClose={closeDetail}
          onEdit={openEditFromDetail}
          onToggleFav={toggleFavInDetail}
          onDelete={() => deleteItem(detailItem.id)}
          onMarkWatched={() => markAsWatched(detailItem)}
        />
      )}

      {editOpen && (
        <EditSheet
          initial={editing}
          defaultIsDaVedere={!editing && tab === "davedere"}
          onClose={closeEdit}
          onSave={saveItem}
          onDelete={editing ? () => deleteItem(editing.id) : null}
        />
      )}

      {menuOpen && (
        <MenuSheet
          onClose={() => setMenuOpen(false)}
          onExportCSV={exportCSV}
          onExportPDF={exportPDF}
          onExportJSON={exportJSON}
          onImport={() => fileInputRef.current?.click()}
          onStats={() => { setMenuOpen(false); setStatsOpen(true); }}
          onReset={resetAll}
          total={items.length}
        />
      )}

      {statsOpen && <StatsSheet items={items} onClose={() => setStatsOpen(false)} />}

      <input
        ref={fileInputRef}
        type="file"
        accept=".csv,.json,text/csv,application/json"
        style={{ display: "none" }}
        onChange={handleImport}
      />

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

function Tabs({ tab, setTab, filmCount, davedereCount }) {
  return (
    <div className="tabs">
      <button className={`tab ${tab==="film"?"active":""}`} onClick={() => setTab("film")}>
        Film <span className="tab-count">{filmCount}</span>
      </button>
      <button className={`tab ${tab==="davedere"?"active":""}`} onClick={() => setTab("davedere")}>
        Da vedere <span className="tab-count">{davedereCount}</span>
      </button>
    </div>
  );
}

function Toolbar({ query, setQuery, favOnly, setFavOnly, sortMode, setSortMode, showFavFilter }) {
  const cycle = () => {
    const order = ["anno", "alfa", "recenti"];
    const next = order[(order.indexOf(sortMode) + 1) % order.length];
    setSortMode(next);
  };
  const labelMap = { anno: "Anno", alfa: "A–Z", recenti: "Recenti" };
  return (
    <div className="toolbar">
      <div className="search-box">
        <Icon.Search />
        <input
          type="search"
          placeholder="Cerca titolo, regia…"
          value={query}
          onChange={e => setQuery(e.target.value)}
        />
      </div>
      <button className="chip-btn chip-sort" onClick={cycle} aria-label="Cambia ordinamento">
        <Icon.Sort />
        <span>{labelMap[sortMode]}</span>
      </button>
      {showFavFilter && (
        <button
          className={`chip-btn ${favOnly?"active":""}`}
          onClick={() => setFavOnly(v => !v)}
          aria-label="Solo preferiti"
        >
          <Icon.Heart filled={favOnly} />
        </button>
      )}
    </div>
  );
}

function ItemCard({ item, onClick, onFav, onCheck }) {
  const isWatch = isDaVedere(item);
  return (
    <div className="card" onClick={onClick}>
      <div className="card-body">
        <div className="card-title">{item.title}</div>
        {(item.year || item.directors || item.recommendedBy) && (
          <div className="card-meta">
            {item.year && <span className="year">{item.year}</span>}
            {item.year && (item.directors || item.recommendedBy) && <span className="dot">·</span>}
            {!isWatch && item.directors && <span className="dir">{item.directors}</span>}
            {isWatch && item.recommendedBy && <span className="rec">👤 {item.recommendedBy}</span>}
            {isWatch && !item.recommendedBy && item.directors && <span className="dir">{item.directors}</span>}
          </div>
        )}
      </div>
      {isWatch ? (
        <button
          className="card-check"
          onClick={(e) => { e.stopPropagation(); onCheck(); }}
          aria-label="Segna come visto"
          title="Segna come visto"
        >
          <Icon.Check />
        </button>
      ) : (
        <button
          className={`card-heart ${item.favorite?"on":""}`}
          onClick={(e) => { e.stopPropagation(); onFav(); }}
          aria-label="Preferito"
        >
          <Icon.Heart filled={item.favorite} />
        </button>
      )}
    </div>
  );
}

function DetailView({ item, onClose, onEdit, onToggleFav, onDelete, onMarkWatched }) {
  const isWatch = isDaVedere(item);
  const fmtDate = (s) => {
    if (!s) return null;
    try {
      const d = new Date(s);
      if (isNaN(d.getTime())) return null;
      return d.toLocaleDateString("it-IT", { day: "numeric", month: "long", year: "numeric" });
    } catch (e) { return null; }
  };
  const addedOn = fmtDate(item.createdAt);

  return (
    <div className="page">
      <div className="page-header">
        <button className="page-header-btn" onClick={onClose}>← Indietro</button>
        <div className="page-title">Dettaglio</div>
        <button className="page-header-btn primary" onClick={onEdit}>Modifica</button>
      </div>
      <div className="page-body detail-body">
        <div className="detail-hero">
          <div className="detail-hero-text">
            <h1 className="detail-title">{item.title}</h1>
            {item.originalTitle && item.originalTitle !== item.title && (
              <div className="detail-orig">{item.originalTitle}</div>
            )}
          </div>
          {!isWatch && (
            <button
              className={`detail-fav ${item.favorite?"on":""}`}
              onClick={onToggleFav}
              aria-label="Preferito"
            >
              <Icon.Heart filled={item.favorite} />
            </button>
          )}
        </div>

        {isWatch && (
          <button className="btn-watch" onClick={onMarkWatched}>
            <Icon.Eye /> Segna come visto
          </button>
        )}

        <div className="detail-rows">
          <div className="detail-row">
            <span className="detail-row-label">Tipologia</span>
            <span className="detail-row-value">{isWatch ? "Da vedere" : "Film"}</span>
          </div>
          {item.year && (
            <div className="detail-row">
              <span className="detail-row-label">Anno</span>
              <span className="detail-row-value">{item.year}</span>
            </div>
          )}
          {item.directors && (
            <div className="detail-row">
              <span className="detail-row-label">Regia</span>
              <span className="detail-row-value">{item.directors}</span>
            </div>
          )}
          {isWatch && item.recommendedBy && (
            <div className="detail-row">
              <span className="detail-row-label">Consigliato da</span>
              <span className="detail-row-value">{item.recommendedBy}</span>
            </div>
          )}
          {item.genres && (
            <div className="detail-row">
              <span className="detail-row-label">Generi</span>
              <span className="detail-row-value">{item.genres}</span>
            </div>
          )}
          {item.runtime && (
            <div className="detail-row">
              <span className="detail-row-label">Durata</span>
              <span className="detail-row-value">{item.runtime} min</span>
            </div>
          )}
          {item.imdbRating && (
            <div className="detail-row">
              <span className="detail-row-label">IMDb</span>
              <span className="detail-row-value">{item.imdbRating.toFixed(1)}</span>
            </div>
          )}
        </div>

        {addedOn && (
          <div className="detail-foot">aggiunto il {addedOn}</div>
        )}
      </div>
    </div>
  );
}

function EditSheet({ initial, defaultIsDaVedere, onClose, onSave, onDelete }) {
  const [title, setTitle] = useState(initial?.title || "");
  const [originalTitle, setOriginalTitle] = useState(initial?.originalTitle || "");
  const [year, setYear] = useState(initial?.year || "");
  const [directors, setDirectors] = useState(initial?.directors || "");
  const [recommendedBy, setRecommendedBy] = useState(initial?.recommendedBy || "");
  const [favorite, setFavorite] = useState(initial?.favorite || false);
  const [isWatchlist, setIsWatchlist] = useState(initial ? isDaVedere(initial) : !!defaultIsDaVedere);
  const [imdbId, setImdbId] = useState(initial?.imdbId || "");
  const [qid, setQid] = useState(initial?.qid || "");
  const [liveEnabled, setLiveEnabled] = useState(!initial);
  const [suggestions, setSuggestions] = useState([]);
  const [loadingSug, setLoadingSug] = useState(false);
  const [showSug, setShowSug] = useState(false);
  const [fetchingDir, setFetchingDir] = useState(false);
  const [searchError, setSearchError] = useState("");
  const debounced = useDebounced(title, 450);
  const lastQueryRef = useRef(initial ? (initial.title || "").trim() : "");
  const reqIdRef = useRef(0);
  const inputRef = useRef(null);

  useEffect(() => {
    if (!liveEnabled) return;
    const q = debounced.trim();
    if (q.length < 2) { setSuggestions([]); setShowSug(false); setSearchError(""); return; }
    if (q === lastQueryRef.current) return;
    lastQueryRef.current = q;
    setSearchError("");
    setLoadingSug(true);
    setShowSug(true);
    const myId = ++reqIdRef.current;
    searchFilms(q).then(({ results }) => {
      if (myId !== reqIdRef.current) return;
      setSuggestions(results);
      setLoadingSug(false);
      if (!results.length) setSearchError("Nessun risultato trovato");
    }).catch(err => {
      if (myId !== reqIdRef.current) return;
      setLoadingSug(false);
      setSearchError("Errore di rete, riprova");
    });
  }, [debounced, liveEnabled]);

  const onPickSuggestion = async (s) => {
    setTitle(s.title);
    setOriginalTitle(s.title);
    if (s.year) setYear(s.year);
    if (s.imdbId) setImdbId(s.imdbId);
    if (s.qid) setQid(s.qid);
    setShowSug(false);
    setSuggestions([]);
    setLiveEnabled(false);
    setSearchError("");
    if (s.directors) {
      setDirectors(s.directors);
    } else if (s.imdbId) {
      setFetchingDir(true);
      try {
        const dir = await fetchDirectorFromWikidata(s.imdbId);
        if (dir) setDirectors(dir);
      } catch (e) { }
      finally { setFetchingDir(false); }
    }
  };

  const onManualSearch = async () => {
    const q = title.trim();
    if (!q) return;
    setLiveEnabled(true);
    setShowSug(true);
    lastQueryRef.current = "";
    setLoadingSug(true);
    setSearchError("");
    const myId = ++reqIdRef.current;
    try {
      const { results } = await searchFilms(q);
      if (myId !== reqIdRef.current) return;
      setSuggestions(results);
      setLoadingSug(false);
      if (!results.length) setSearchError("Nessun risultato trovato");
    } catch (err) {
      if (myId !== reqIdRef.current) return;
      setLoadingSug(false);
      setSearchError("Errore di rete, riprova");
    }
  };

  const onTitleChange = (v) => {
    setTitle(v);
    if (!liveEnabled) setLiveEnabled(true);
    if (!v.trim()) { setShowSug(false); setSearchError(""); }
  };

  useEffect(() => {
    if (!showSug) return;
    const handler = (e) => {
      if (e.target.closest(".input-with-btn")) return;
      setShowSug(false);
    };
    document.addEventListener("click", handler);
    return () => document.removeEventListener("click", handler);
  }, [showSug]);

  const canSave = title.trim().length > 0;

  const submit = () => {
    if (!canSave) return;
    onSave({
      id: initial?.id,
      imdbId: imdbId || initial?.imdbId || "",
      qid: qid || initial?.qid || "",
      title: title.trim(),
      originalTitle: originalTitle.trim(),
      year: year ? parseInt(year, 10) : null,
      directors: directors.trim(),
      recommendedBy: isWatchlist ? recommendedBy.trim() : "",
      favorite: isWatchlist ? false : favorite,
      isDaVedere: isWatchlist,
      genres: initial?.genres || "",
      runtime: initial?.runtime || null,
      imdbRating: initial?.imdbRating || null,
      type: isWatchlist ? "Da vedere" : "Film",
    });
  };

  return (
    <div className="page" onClick={e => e.stopPropagation()}>
      <div className="page-header">
        <button className="page-header-btn" onClick={onClose}>Annulla</button>
        <div className="page-title">{initial ? "Modifica" : (isWatchlist ? "Da vedere" : "Nuovo film")}</div>
        <button className="page-header-btn primary" onClick={submit} disabled={!canSave}>
          {initial ? "Salva" : "Aggiungi"}
        </button>
      </div>
      <div className="page-body">
        <div className="field">
          <label>Tipologia</label>
          <div style={{display:"flex", gap:8}}>
            <button
              type="button"
              className={`chip-btn ${!isWatchlist?"active":""}`}
              style={{flex:1, justifyContent:"center", padding:"11px"}}
              onClick={() => setIsWatchlist(false)}
            >Film visto</button>
            <button
              type="button"
              className={`chip-btn ${isWatchlist?"active":""}`}
              style={{flex:1, justifyContent:"center", padding:"11px"}}
              onClick={() => setIsWatchlist(true)}
            >Da vedere</button>
          </div>
        </div>

        <div className="field">
          <label>Titolo</label>
          <div className="input-with-btn">
            <input
              ref={inputRef}
              className="input"
              value={title}
              onChange={e => onTitleChange(e.target.value)}
              placeholder="es. Metropolis"
              autoFocus={!initial}
              autoComplete="off"
              autoCorrect="off"
              spellCheck="false"
              onFocus={() => title.trim().length >= 2 && suggestions.length && setShowSug(true)}
            />
            <button type="button" className="search-btn" onClick={onManualSearch} disabled={!title.trim() || loadingSug}>
              {loadingSug ? <span className="spin"></span> : <Icon.Sparkle />}
              <span>Cerca</span>
            </button>
            {showSug && (
              <div className="suggestions" onClick={e => e.stopPropagation()}>
                {loadingSug && <div className="sugg-loading"><span className="spin" style={{verticalAlign:"middle",marginRight:8}}></span>Ricerca in corso…</div>}
                {!loadingSug && searchError && <div className="sugg-empty">{searchError}</div>}
                {!loadingSug && !searchError && suggestions.map((s, idx) => (
                  <div key={`${s.id||"x"}-${s.qid||"x"}-${idx}`} className="sugg-item" onClick={() => onPickSuggestion(s)}>
                    <div className="sugg-body">
                      <div className="sugg-title">{s.title}</div>
                      <div className="sugg-meta">
                        {s.year || "—"}
                        {s.directors && <span> · {s.directors.length > 40 ? s.directors.slice(0,38)+"…" : s.directors}</span>}
                        {!s.directors && s.stars && <span> · {s.stars}</span>}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
          {fetchingDir && (
            <div className="sugg-dir-fetch">
              <span className="spin"></span> Ricerca regista…
            </div>
          )}
        </div>

        <div className="field">
          <label>Titolo originale <span style={{opacity:.5, textTransform:"none", letterSpacing:0}}>(facoltativo)</span></label>
          <input
            className="input"
            value={originalTitle}
            onChange={e => setOriginalTitle(e.target.value)}
            placeholder="es. Metropolis"
          />
        </div>

        <div className="inline-row">
          <div className="field">
            <label>Anno</label>
            <input
              className="input"
              type="number"
              inputMode="numeric"
              value={year}
              onChange={e => setYear(e.target.value)}
              placeholder="es. 1927"
            />
          </div>
          <div className="field" style={{flex:2}}>
            <label>Regia</label>
            <input
              className="input"
              value={directors}
              onChange={e => setDirectors(e.target.value)}
              placeholder="es. Fritz Lang"
            />
          </div>
        </div>

        {isWatchlist && (
          <div className="field">
            <label>Consigliato da <span style={{opacity:.5, textTransform:"none", letterSpacing:0}}>(facoltativo)</span></label>
            <input
              className="input"
              value={recommendedBy}
              onChange={e => setRecommendedBy(e.target.value)}
              placeholder="es. Marco, Luca…"
            />
          </div>
        )}

        {!isWatchlist && (
          <div className="field">
            <button
              type="button"
              className={`chip-btn ${favorite?"active":""}`}
              style={{padding:"11px 14px"}}
              onClick={() => setFavorite(v => !v)}
            >
              <Icon.Heart filled={favorite} />
              {favorite ? "Tra i preferiti" : "Aggiungi ai preferiti"}
            </button>
          </div>
        )}

        {onDelete && (
          <div style={{marginTop:28, paddingTop:18, borderTop:"1px solid var(--line)"}}>
            <button
              className="btn btn-danger-ghost"
              onClick={() => { if (confirm("Eliminare questo titolo?")) onDelete(); }}
              style={{padding:"10px 0"}}
            >
              <Icon.Trash /> Elimina
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function MenuSheet({ onClose, onExportCSV, onExportPDF, onExportJSON, onImport, onStats, onReset, total }) {
  return (
    <>
      <div className="backdrop" onClick={onClose} />
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <div className="sheet-handle" />
        <div className="sheet-header">
          <div className="sheet-title">Menu</div>
          <button className="icon-btn" onClick={onClose}><Icon.Close /></button>
        </div>
        <div className="sheet-body">
          <button className="menu-item" onClick={onStats}>
            <Icon.Chart />
            <div style={{flex:1}}>
              <div>Statistiche</div>
              <div className="menu-item-sub">{total} titoli in libreria</div>
            </div>
            <Icon.Chevron />
          </button>
          <button className="menu-item" onClick={onImport}>
            <Icon.Upload />
            <div style={{flex:1}}>
              <div>Importa file</div>
              <div className="menu-item-sub">JSON di Cinemino o CSV</div>
            </div>
          </button>
          <button className="menu-item" onClick={onExportJSON}>
            <Icon.Download />
            <div style={{flex:1}}>
              <div>Esporta JSON</div>
              <div className="menu-item-sub">Backup completo</div>
            </div>
          </button>
          <button className="menu-item" onClick={onExportCSV}>
            <Icon.Download />
            <div style={{flex:1}}>
              <div>Esporta CSV</div>
              <div className="menu-item-sub">Per fogli di calcolo</div>
            </div>
          </button>
          <button className="menu-item" onClick={onExportPDF}>
            <Icon.Download />
            <div style={{flex:1}}>
              <div>Esporta PDF</div>
              <div className="menu-item-sub">Elenco stampabile</div>
            </div>
          </button>
          <button className="menu-item menu-item-danger" onClick={onReset}>
            <Icon.Trash />
            <div style={{flex:1}}>
              <div>Svuota libreria</div>
              <div className="menu-item-sub">Elimina tutti i titoli</div>
            </div>
          </button>
        </div>
      </div>
    </>
  );
}

function StatsSheet({ items, onClose }) {
  const films = items.filter(i => !isDaVedere(i));
  const watchlist = items.filter(i => isDaVedere(i));
  const favs = items.filter(i => i.favorite);

  const byDecade = {};
  for (const f of films) {
    if (!f.year) continue;
    const d = Math.floor(f.year / 10) * 10;
    byDecade[d] = (byDecade[d] || 0) + 1;
  }
  const decades = Object.entries(byDecade).sort((a,b) => a[0] - b[0]);
  const maxDec = Math.max(1, ...decades.map(([,n]) => n));

  const dirCount = {};
  for (const f of films) {
    if (!f.directors) continue;
    for (const d of f.directors.split(",").map(s => s.trim()).filter(Boolean)) {
      dirCount[d] = (dirCount[d] || 0) + 1;
    }
  }
  const topDirs = Object.entries(dirCount).sort((a,b) => b[1] - a[1]).slice(0, 8);

  const recCount = {};
  for (const f of watchlist) {
    if (!f.recommendedBy) continue;
    for (const r of f.recommendedBy.split(",").map(s => s.trim()).filter(Boolean)) {
      recCount[r] = (recCount[r] || 0) + 1;
    }
  }
  const topRec = Object.entries(recCount).sort((a,b) => b[1] - a[1]).slice(0, 5);

  return (
    <>
      <div className="backdrop" onClick={onClose} />
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <div className="sheet-handle" />
        <div className="sheet-header">
          <div className="sheet-title">Statistiche</div>
          <button className="icon-btn" onClick={onClose}><Icon.Close /></button>
        </div>
        <div className="sheet-body">
          <div className="stats-grid">
            <div className="stat"><div className="stat-num">{films.length}</div><div className="stat-label">Film visti</div></div>
            <div className="stat"><div className="stat-num">{watchlist.length}</div><div className="stat-label">Da vedere</div></div>
            <div className="stat"><div className="stat-num">{favs.length}</div><div className="stat-label">Preferiti</div></div>
            <div className="stat"><div className="stat-num">{new Set(films.flatMap(i => (i.directors||"").split(",").map(s => s.trim()).filter(Boolean))).size}</div><div className="stat-label">Registi</div></div>
          </div>

          {decades.length > 0 && (
            <>
              <div className="divider-label" style={{padding:"22px 0 8px"}}>Film per decennio</div>
              <div>
                {decades.map(([dec, n]) => (
                  <div key={dec} style={{display:"flex", alignItems:"center", gap:10, padding:"5px 0", fontVariantNumeric:"tabular-nums"}}>
                    <div style={{width:52, fontSize:13, color:"var(--ink-soft)", fontWeight:500}}>{dec}s</div>
                    <div style={{flex:1, background:"var(--line)", height:8, borderRadius:4, overflow:"hidden"}}>
                      <div style={{width:`${n/maxDec*100}%`, height:"100%", background:"var(--accent)", borderRadius:4}}/>
                    </div>
                    <div style={{width:36, textAlign:"right", fontSize:13, color:"var(--muted)"}}>{n}</div>
                  </div>
                ))}
              </div>
            </>
          )}

          {topDirs.length > 0 && (
            <>
              <div className="divider-label" style={{padding:"22px 0 8px"}}>Registi più visti</div>
              <div>
                {topDirs.map(([name, n]) => (
                  <div key={name} style={{display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:"1px solid var(--line)", fontSize:14}}>
                    <span style={{fontFamily:"Fraunces,serif", fontStyle:"italic"}}>{name}</span>
                    <span style={{color:"var(--muted)", fontVariantNumeric:"tabular-nums"}}>{n}</span>
                  </div>
                ))}
              </div>
            </>
          )}

          {topRec.length > 0 && (
            <>
              <div className="divider-label" style={{padding:"22px 0 8px"}}>Chi consiglia di più</div>
              <div>
                {topRec.map(([name, n]) => (
                  <div key={name} style={{display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:"1px solid var(--line)", fontSize:14}}>
                    <span>👤 {name}</span>
                    <span style={{color:"var(--muted)", fontVariantNumeric:"tabular-nums"}}>{n} film</span>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </div>
    </>
  );
}

function downloadBlob(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
