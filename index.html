<style>
:root {
  --bg: #f6f1e8; --bg-elev: #fdf9f2; --ink: #1a1410; --ink-soft: #4a3f36;
  --muted: #8a7d6e; --line: #e4d7bf; --line-strong: #d4c4a8;
  --accent: #8b1a1a; --accent-soft: #b04040; --accent-bg: #f3e4e4;
  --heart: #c42b2b; --watch: #2a6b3a; --watch-bg: #e4f3e4;
  --shadow-sm: 0 1px 2px rgba(26,20,16,.06); --shadow: 0 4px 16px rgba(26,20,16,.08);
  --shadow-lg: 0 20px 50px rgba(26,20,16,.18);
  --r-sm: 8px; --r: 12px; --r-lg: 18px;
  --safe-top: env(safe-area-inset-top, 0px); --safe-bot: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #14100d; --bg-elev: #1d1814; --ink: #f1ead9; --ink-soft: #c8bca6;
    --muted: #8a7d6e; --line: #2d2520; --line-strong: #3d342c;
    --accent: #d44545; --accent-soft: #e36868; --accent-bg: #3a1818;
    --heart: #e64545; --watch: #4a9b5a; --watch-bg: #1a3a22;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.4); --shadow: 0 4px 16px rgba(0,0,0,.5);
    --shadow-lg: 0 20px 50px rgba(0,0,0,.65);
  }
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); overscroll-behavior-y: none; }
body { font-family: 'DM Sans', system-ui, -apple-system, sans-serif; font-size: 15px; line-height: 1.45; -webkit-font-smoothing: antialiased; min-height: 100vh; min-height: 100dvh; }
button, input, textarea, select { font: inherit; color: inherit; }
button { background: none; border: 0; cursor: pointer; padding: 0; }
input, textarea { -webkit-appearance: none; appearance: none; }

.app { max-width: 560px; margin: 0 auto; min-height: 100vh; min-height: 100dvh; position: relative; padding-bottom: calc(24px + var(--safe-bot)); }

/* Header */
.header { position: sticky; top: 0; z-index: 30; background: var(--bg); padding-top: var(--safe-top); border-bottom: 1px solid var(--line); }
.header-inner { padding: 14px 18px 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.brand { font-family: 'Fraunces', serif; font-weight: 700; font-size: 28px; letter-spacing: -0.015em; font-variation-settings: "opsz" 72, "SOFT" 30; color: var(--ink); display: inline-flex; align-items: center; gap: 10px; }
.brand-mark { width: 30px; height: 30px; flex-shrink: 0; display: block; }
@media (prefers-color-scheme: dark) { .brand-mark { filter: brightness(1.3) saturate(0.9); } }
.header-actions { display: flex; align-items: center; gap: 4px; }
.icon-btn { width: 40px; height: 40px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; color: var(--ink); transition: background .15s; }
.icon-btn:hover, .icon-btn:active { background: var(--line); }
.icon-btn svg { width: 20px; height: 20px; }
.icon-btn.icon-btn-primary { background: var(--accent); color: var(--bg); }
.icon-btn.icon-btn-primary:hover, .icon-btn.icon-btn-primary:active { background: var(--accent-soft); }
.icon-btn.icon-btn-primary svg { width: 22px; height: 22px; }

/* Tabs */
.tabs { display: flex; padding: 0 14px; gap: 4px; }
.tab { flex: 1; padding: 10px 12px 12px; font-size: 14px; font-weight: 500; color: var(--muted); border-bottom: 2px solid transparent; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px; transition: color .15s, border-color .15s; }
.tab-count { font-size: 11px; background: var(--line); color: var(--ink-soft); padding: 1px 7px; border-radius: 999px; font-weight: 600; font-variant-numeric: tabular-nums; }
.tab.active { color: var(--ink); border-bottom-color: var(--accent); }
.tab.active .tab-count { background: var(--accent); color: var(--bg); }

/* Toolbar */
.toolbar { display: flex; gap: 8px; align-items: center; padding: 12px 16px 10px; }
.search-box { flex: 1; position: relative; }
.search-box input { width: 100%; background: var(--bg-elev); border: 1px solid var(--line); border-radius: 999px; padding: 10px 14px 10px 38px; font-size: 16px; outline: none; transition: border-color .15s; }
.search-box input:focus { border-color: var(--accent-soft); }
.search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--muted); }
.chip-btn { padding: 9px 12px; border-radius: 999px; border: 1px solid var(--line); background: var(--bg-elev); font-size: 13px; font-weight: 500; color: var(--ink-soft); display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; transition: all .15s; }
.chip-btn.active { background: var(--accent-bg); border-color: var(--accent-soft); color: var(--accent); }
.chip-btn svg { width: 14px; height: 14px; }

/* List / Cards */
.list { padding: 4px 12px 20px; }
.card { display: flex; gap: 14px; padding: 14px 12px; border-bottom: 1px solid var(--line); align-items: center; cursor: pointer; transition: background .15s; }
.card:hover { background: var(--bg-elev); }
.card-body { flex: 1; min-width: 0; }
.card-title { font-weight: 600; font-size: 17px; color: var(--ink); line-height: 1.25; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; letter-spacing: -0.005em; }
.card-meta { font-size: 13px; color: var(--ink-soft); margin-top: 4px; display: flex; gap: 6px; align-items: center; font-variant-numeric: tabular-nums; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-meta .year { font-weight: 500; }
.card-meta .dot { color: var(--line-strong); }
.card-meta .dir { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-style: italic; font-family: 'Fraunces', serif; color: var(--muted); }
.card-meta .rec { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--watch); font-weight: 500; }
.card-heart { flex-shrink: 0; padding: 8px; margin: -8px -4px -8px 0; color: var(--muted); display: flex; align-items: center; justify-content: center; }
.card-heart svg { width: 20px; height: 20px; transition: transform .15s; }
.card-heart.on { color: var(--heart); }
.card-heart.on svg { transform: scale(1.08); }
.card-heart:active svg { transform: scale(.85); }
.card-check { flex-shrink: 0; padding: 8px; margin: -8px -4px -8px 0; color: var(--watch); display: flex; align-items: center; justify-content: center; border-radius: 999px; transition: background .15s; }
.card-check:hover, .card-check:active { background: var(--watch-bg); }
.card-check svg { width: 22px; height: 22px; }

/* Empty / no results */
.no-results { padding: 40px 20px; text-align: center; color: var(--muted); font-style: italic; font-family: 'Fraunces', serif; }

/* Backdrop + Sheet */
.backdrop { position: fixed; inset: 0; background: rgba(26,20,16,.45); z-index: 100; opacity: 0; animation: fadeIn .18s forwards; backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); }
@keyframes fadeIn { to { opacity: 1; } }
.sheet { position: fixed; left: 0; right: 0; bottom: 0; background: var(--bg); border-radius: 22px 22px 0 0; z-index: 101; max-width: 560px; margin: 0 auto; max-height: 92dvh; max-height: 92vh; display: flex; flex-direction: column; transform: translateY(100%); animation: slideUp .26s cubic-bezier(.2,.7,.2,1) forwards; padding-bottom: var(--safe-bot); box-shadow: 0 -10px 40px rgba(0,0,0,.2); }
@keyframes slideUp { to { transform: translateY(0); } }
.sheet-handle { width: 38px; height: 4px; background: var(--line-strong); border-radius: 999px; margin: 9px auto 4px; flex-shrink: 0; }
.sheet-header { padding: 6px 18px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.sheet-title { font-family: 'Fraunces', serif; font-style: italic; font-size: 22px; font-weight: 600; }
.sheet-body { padding: 16px 18px 20px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }

/* Page (full-screen) */
.page { position: fixed; inset: 0; background: var(--bg); z-index: 110; display: flex; flex-direction: column; max-width: 560px; margin: 0 auto; padding-top: var(--safe-top); padding-bottom: var(--safe-bot); animation: pageSlideIn .22s cubic-bezier(.2,.7,.2,1); }
@keyframes pageSlideIn { from { transform: translateX(8%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.page-header { padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--line); flex-shrink: 0; background: var(--bg); }
.page-title { font-family: 'Fraunces', serif; font-style: italic; font-size: 22px; font-weight: 600; flex: 1; text-align: center; margin: 0 8px; }
.page-body { padding: 18px 18px 20px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
.page-header-btn { font-size: 15px; font-weight: 500; color: var(--ink); padding: 8px 4px; background: none; min-width: 64px; text-align: left; }
.page-header-btn.primary { color: var(--accent); font-weight: 600; text-align: right; }
.page-header-btn:disabled { opacity: .4; }

/* Detail */
.detail-body { padding: 0; }
.detail-hero { padding: 28px 22px 18px; display: flex; align-items: flex-start; gap: 14px; border-bottom: 1px solid var(--line); }
.detail-hero-text { flex: 1; min-width: 0; }
.detail-title { font-family: 'Fraunces', serif; font-weight: 700; font-size: 32px; line-height: 1.05; letter-spacing: -0.015em; margin: 0 0 6px 0; color: var(--ink); font-variation-settings: "opsz" 96, "SOFT" 30; word-wrap: break-word; }
.detail-orig { font-family: 'Fraunces', serif; font-style: italic; font-size: 16px; color: var(--muted); line-height: 1.3; }
.detail-fav { flex-shrink: 0; width: 44px; height: 44px; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; color: var(--muted); transition: background .15s, color .15s; margin-top: 4px; }
.detail-fav:hover, .detail-fav:active { background: var(--line); }
.detail-fav.on { color: var(--heart); }
.detail-fav svg { width: 24px; height: 24px; }
.detail-rows { padding: 6px 22px; }
.detail-row { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--line); }
.detail-row:last-child { border-bottom: 0; }
.detail-row-label { font-size: 13px; color: var(--muted); font-weight: 500; flex-shrink: 0; }
.detail-row-value { font-size: 15px; color: var(--ink); text-align: right; word-wrap: break-word; min-width: 0; }
.detail-foot { text-align: center; padding: 22px 22px 8px; font-size: 12.5px; color: var(--muted); font-style: italic; font-family: 'Fraunces', serif; }
.btn-watch { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 18px 22px 0; width: calc(100% - 44px); padding: 14px 16px; border-radius: var(--r); font-size: 15px; font-weight: 600; background: var(--watch); color: #fff; transition: opacity .15s; }
.btn-watch:active { opacity: .85; }
.btn-watch svg { width: 18px; height: 18px; }

/* Form */
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 6px; }
.input { width: 100%; background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--r); padding: 11px 13px; font-size: 16px; outline: none; transition: border-color .15s; }
.input:focus { border-color: var(--accent-soft); }
.input-with-btn { display: flex; gap: 8px; position: relative; }
.input-with-btn .input { flex: 1; }
.search-btn { padding: 0 14px; background: var(--ink); color: var(--bg); border-radius: var(--r); font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; flex-shrink: 0; transition: opacity .15s; }
.search-btn:disabled { opacity: .5; }
.search-btn svg { width: 14px; height: 14px; }
.inline-row { display: flex; gap: 10px; }
.inline-row .field { flex: 1; }
.btn { padding: 12px 16px; border-radius: var(--r); font-size: 15px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: all .15s; }
.btn-danger-ghost { color: var(--accent); background: transparent; }

/* Suggestions */
.suggestions { position: absolute; left: 0; right: 62px; top: calc(100% + 4px); background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--r); box-shadow: var(--shadow-lg); max-height: 320px; overflow-y: auto; z-index: 5; }
.sugg-item { display: flex; gap: 10px; padding: 10px 12px; align-items: center; border-bottom: 1px solid var(--line); cursor: pointer; transition: background .12s; }
.sugg-item:last-child { border-bottom: 0; }
.sugg-item:hover, .sugg-item.highlight { background: var(--accent-bg); }
.sugg-body { flex: 1; min-width: 0; }
.sugg-title { font-size: 14px; font-weight: 500; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sugg-meta { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; margin-top: 1px; }
.sugg-loading, .sugg-empty { padding: 14px; text-align: center; font-size: 13px; color: var(--muted); font-style: italic; }
.sugg-dir-fetch { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--accent); margin-top: 4px; }
.spin { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--line-strong); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Menu items */
.menu-item { display: flex; align-items: center; gap: 14px; padding: 14px 4px; border-bottom: 1px solid var(--line); width: 100%; text-align: left; font-size: 15px; color: var(--ink); }
.menu-item:last-child { border-bottom: 0; }
.menu-item svg { width: 20px; height: 20px; color: var(--ink-soft); flex-shrink: 0; }
.menu-item-danger { color: var(--accent); }
.menu-item-danger svg { color: var(--accent); }
.menu-item-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* Stats */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
.stat { background: var(--bg-elev); border: 1px solid var(--line); border-radius: var(--r); padding: 12px 14px; }
.stat-num { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600; color: var(--ink); line-height: 1.1; font-variant-numeric: tabular-nums; }
.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 3px; }

/* Toast */
.toast { position: fixed; bottom: calc(22px + var(--safe-bot)); left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--bg); padding: 10px 16px; border-radius: 999px; font-size: 13.5px; font-weight: 500; z-index: 200; animation: toastIn .25s; box-shadow: var(--shadow-lg); max-width: 90vw; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } }

.divider-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; padding: 14px 12px 6px; }

/* iOS sticky header fix */
@supports (-webkit-touch-callout: none) { .header { transform: translateZ(0); } }
</style>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo } = React;
const STORAGE_KEY = 'cinemino.v1';

/* ── Storage ── */
function loadItems() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return null;
    const seen = new Set();
    return parsed.filter(it => it && typeof it === 'object' && it.title).map(it => {
      if (!it.id || seen.has(it.id)) { const id = uid(); seen.add(id); return { ...it, id }; }
      seen.add(it.id); return it;
    });
  } catch (e) { return null; }
}
function saveItems(items) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch (e) {}
}

/* ── Utils ── */
let _uid = 0;
const uid  = () => 'l-' + Date.now().toString(36) + '-' + (++_uid).toString(36) + '-' + Math.random().toString(36).slice(2,8);
const norm = s  => (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

function isDaVedere(i) { return (i.type||'').toLowerCase().includes('da vedere'); }

function csvEscape(v) {
  if (v == null) return '';
  const s = String(v);
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
}

function parseCSV(text) {
  const rows = []; let row = [], field = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) { if (ch==='"') { if (text[i+1]==='"') { field+='"'; i++; } else inQ=false; } else field+=ch; }
    else {
      if (ch==='"') inQ=true;
      else if (ch===',') { row.push(field); field=''; }
      else if (ch==='\n') { row.push(field); rows.push(row); row=[]; field=''; }
      else if (ch!=='\r') field+=ch;
    }
  }
  if (field || row.length) { row.push(field); if (!(row.length===1&&row[0]==='')) rows.push(row); }
  return rows;
}

function downloadBlob(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

/* ── API: Wikidata (primary) + IMDb (fallback) ── */
async function fetchWikidataSuggestions(query) {
  const safe = query.replace(/\\/g,'\\\\').replace(/"/g,'\\"');
  const sparql = `SELECT ?item ?itemLabel ?year (GROUP_CONCAT(DISTINCT ?dirName; separator=", ") AS ?directors) ?imdb WHERE {
  SERVICE wikibase:mwapi {
    bd:serviceParam wikibase:endpoint "www.wikidata.org" .
    bd:serviceParam wikibase:api "EntitySearch" .
    bd:serviceParam mwapi:search "${safe}" .
    bd:serviceParam mwapi:language "it" .
    ?item wikibase:apiOutputItem mwapi:item .
  }
  ?item wdt:P31/wdt:P279* wd:Q11424 .
  OPTIONAL { ?item wdt:P577 ?date . BIND(YEAR(?date) AS ?year) }
  OPTIONAL { ?item wdt:P57 ?dir . ?dir rdfs:label ?lbl . FILTER(LANG(?lbl)="it"||LANG(?lbl)="en") BIND(STR(?lbl) AS ?dirName) }
  OPTIONAL { ?item wdt:P345 ?imdb }
  SERVICE wikibase:label { bd:serviceParam wikibase:language "it,en" . ?item rdfs:label ?itemLabel . }
}
GROUP BY ?item ?itemLabel ?year ?imdb
ORDER BY DESC(?year) LIMIT 12`;
  const url = 'https://query.wikidata.org/sparql?format=json&query=' + encodeURIComponent(sparql);
  try {
    const r = await fetch(url, { headers: { Accept: 'application/sparql-results+json' } });
    if (!r.ok) return [];
    const data = await r.json();
    const seen = new Set(); const out = [];
    for (const b of data.results?.bindings || []) {
      const qid = (b.item?.value||'').split('/').pop();
      if (!qid || seen.has(qid)) continue; seen.add(qid);
      let directors = b.directors?.value || '';
      if (directors) {
        const ds = new Set();
        directors = directors.split(',').map(s=>s.trim()).filter(s=>{ const k=s.toLowerCase(); if (!s||ds.has(k)) return false; ds.add(k); return true; }).join(', ');
      }
      out.push({ id: b.imdb?.value||qid, imdbId: b.imdb?.value||'', qid, title: b.itemLabel?.value||'', year: b.year?.value ? parseInt(b.year.value,10) : null, directors });
    }
    return out.slice(0,10);
  } catch(e) { return []; }
}

async function fetchImdbSuggestions(query) {
  const q = query.trim().toLowerCase().replace(/[^a-z0-9\s]/gi,'').replace(/\s+/g,'_');
  if (!q) return [];
  const url = `https://v3.sg.media-imdb.com/suggestion/${q[0]}/${encodeURIComponent(q)}.json`;
  try {
    const r = await fetch(url); if (!r.ok) return [];
    const data = await r.json();
    return (data.d||[])
      .filter(d => /movie|short|feature/i.test(d.qid||d.q||'') || d.q==='feature')
      .slice(0,10)
      .map(d => ({ id: d.id, imdbId: d.id, qid: null, title: d.l||'', year: d.y||(d.yr?parseInt(d.yr,10):null), directors: '', stars: d.s||'' }));
  } catch(e) { return []; }
}

async function searchFilms(query) {
  const wd = await fetchWikidataSuggestions(query);
  if (wd.length >= 3) return wd;
  const imdb = await fetchImdbSuggestions(query);
  const seen = new Set(wd.map(r=>r.imdbId).filter(Boolean));
  const merged = [...wd];
  for (const it of imdb) { if (!it.imdbId||!seen.has(it.imdbId)) { merged.push(it); if(it.imdbId) seen.add(it.imdbId); } }
  return merged.slice(0,10);
}

async function fetchDirectorFromWikidata(imdbId) {
  if (!imdbId) return null;
  const sparql = `SELECT (GROUP_CONCAT(DISTINCT ?name; separator=", ") AS ?directors) WHERE {
    ?film wdt:P345 "${imdbId}" . ?film wdt:P57 ?dir . ?dir rdfs:label ?lbl .
    FILTER(LANG(?lbl)="it"||LANG(?lbl)="en") BIND(STR(?lbl) AS ?name) }`;
  const url = 'https://query.wikidata.org/sparql?format=json&query=' + encodeURIComponent(sparql);
  try {
    const r = await fetch(url, { headers: { Accept: 'application/sparql-results+json' } });
    if (!r.ok) return null;
    const data = await r.json();
    const v = data.results?.bindings?.[0]?.directors?.value;
    if (!v) return null;
    const ds = new Set();
    return v.split(',').map(s=>s.trim()).filter(s=>{ const k=s.toLowerCase(); if(!s||ds.has(k)) return false; ds.add(k); return true; }).join(', ');
  } catch(e) { return null; }
}

function useDebounced(value, delay) {
  const [v, setV] = useState(value);
  useEffect(() => { const id = setTimeout(()=>setV(value), delay); return ()=>clearTimeout(id); }, [value, delay]);
  return v;
}

/* ── App ── */
function App() {
  const [items, setItems]     = useState(() => loadItems() || []);
  const [tab, setTab]         = useState('film'); // 'film' | 'davedere'
  const [query, setQuery]     = useState('');
  const [favOnly, setFavOnly] = useState(false);
  const [sortMode, setSortMode] = useState('anno'); // 'anno' | 'alfa' | 'recenti'
  const [editOpen, setEditOpen]     = useState(false);
  const [editing, setEditing]       = useState(null);
  const [detailItem, setDetailItem] = useState(null);
  const [menuOpen, setMenuOpen]     = useState(false);
  const [statsOpen, setStatsOpen]   = useState(false);
  const [toast, setToast]           = useState(null);
  const fileInputRef = useRef(null);
  const toastTimerRef = useRef(null);

  useEffect(() => { saveItems(items); }, [items]);

  const showToast = msg => {
    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
    setToast(msg);
    toastTimerRef.current = setTimeout(() => { setToast(null); toastTimerRef.current = null; }, 2200);
  };

  const films    = useMemo(() => items.filter(i => !isDaVedere(i)), [items]);
  const watchlist= useMemo(() => items.filter(i =>  isDaVedere(i)), [items]);

  const visible = useMemo(() => {
    const base = tab === 'film' ? films : watchlist;
    const q = norm(query);
    let out = base;
    if (tab === 'film' && favOnly) out = out.filter(i => i.favorite);
    if (q) out = out.filter(i =>
      norm(i.title).includes(q) || norm(i.originalTitle).includes(q) ||
      norm(i.directors).includes(q) || norm(i.recommendedBy).includes(q)
    );
    const byTitle = (a,b) => norm(a.title).localeCompare(norm(b.title),'it');
    if (sortMode === 'anno')    return [...out].sort((a,b) => (b.year||0)-(a.year||0) || byTitle(a,b));
    if (sortMode === 'alfa')    return [...out].sort(byTitle);
    /* recenti */ return [...out].sort((a,b) => {
      if ((b.favorite?1:0) !== (a.favorite?1:0)) return (b.favorite?1:0)-(a.favorite?1:0);
      const [da,db] = [a.createdAt||'', b.createdAt||''];
      if (da!==db) return db.localeCompare(da);
      return (b.year||0)-(a.year||0);
    });
  }, [tab, films, watchlist, query, favOnly, sortMode]);

  /* ── CRUD ── */
  const openAdd  = () => { setEditing(null); setEditOpen(true); };
  const closeEdit= () => { setEditOpen(false); setEditing(null); };
  const closeDetail = () => setDetailItem(null);

  const openEditFromDetail = () => { setEditing(detailItem); setEditOpen(true); };

  const saveItem = data => {
    // Strip isDaVedere flag; derive type from it
    const { isDaVedere: flagDV, ...cleanData } = data;
    const newType = flagDV ? 'Da vedere' : 'Film';

    if (data.id) {
      // Edit existing item
      setItems(prev => prev.map(i => i.id === data.id ? { ...i, ...cleanData, id: i.id, type: newType } : i));
      setDetailItem(prev => prev?.id === data.id ? { ...prev, ...cleanData, id: prev.id, type: newType } : prev);
      showToast('Modifiche salvate');
    } else {
      // New item – duplicate guard on imdbId
      if (cleanData.imdbId) {
        const dup = items.find(i => i.imdbId && i.imdbId === cleanData.imdbId);
        if (dup && !confirm(`"${dup.title}" è già in libreria. Aggiungere comunque?`)) { closeEdit(); return; }
      }
      const newItem = { ...cleanData, id: uid(), type: newType, favorite: flagDV ? false : !!cleanData.favorite, createdAt: new Date().toISOString().slice(0,10) };
      setItems(prev => [newItem, ...prev]);
      showToast(flagDV ? 'Aggiunto alla lista' : 'Film aggiunto');
      setTab(flagDV ? 'davedere' : 'film');
    }
    closeEdit();
  };

  const deleteItem = id => {
    if (!id) { closeEdit(); return; }
    setItems(prev => prev.filter(i => i.id !== id));
    closeEdit(); closeDetail();
    showToast('Eliminato');
  };

  const markAsWatched = item => {
    setItems(prev => prev.map(i => i.id === item.id ? { ...i, type: 'Film' } : i));
    closeDetail();
    setTab('film');
    showToast(`"${item.title}" spostato tra i film visti`);
  };

  const toggleFavInDetail = () => {
    if (!detailItem) return;
    setItems(prev => prev.map(i => i.id === detailItem.id ? { ...i, favorite: !i.favorite } : i));
    setDetailItem(prev => prev ? { ...prev, favorite: !prev.favorite } : prev);
  };

  const toggleFav = id => setItems(prev => prev.map(i => i.id === id ? { ...i, favorite: !i.favorite } : i));

  /* ── Export / Import ── */
  const exportCSV = () => {
    const head = ['Tipo','Titolo','Titolo originale','Anno','Regia','Generi','Durata (min)','IMDb','IMDb ID','Preferito','Consigliato da','Aggiunto il'];
    const rows = items.map(i => [
      isDaVedere(i)?'Da vedere':'Film', i.title, i.originalTitle, i.year,
      i.directors, i.genres, i.runtime, i.imdbRating, i.imdbId,
      i.favorite?'si':'', i.recommendedBy||'', i.createdAt||''
    ].map(csvEscape).join(','));
    downloadBlob([head.join(','),...rows].join('\n'), 'cinemino.csv', 'text/csv;charset=utf-8');
    setMenuOpen(false); showToast('CSV esportato');
  };

  const exportJSON = () => {
    downloadBlob(JSON.stringify(items,null,2), 'cinemino.json', 'application/json;charset=utf-8');
    setMenuOpen(false); showToast('JSON esportato');
  };

  const exportPDF = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit:'pt', format:'a4' });
    const W = doc.internal.pageSize.getWidth(), H = doc.internal.pageSize.getHeight(), M = 40;
    let y = M;
    doc.setFont('times','italic'); doc.setFontSize(26); doc.text('Cinemino', M, y); y+=22;
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(120);
    doc.text(`${films.length} film · ${watchlist.length} da vedere · ${items.filter(i=>i.favorite).length} preferiti`, M, y);
    doc.text(new Date().toLocaleDateString('it-IT'), W-M, y, { align:'right' }); y+=18;
    doc.setDrawColor(200); doc.line(M, y, W-M, y); y+=14; doc.setTextColor(30);
    for (const { label, data } of [
      { label:'FILM VISTI', data:[...films].sort((a,b)=>(b.year||0)-(a.year||0)) },
      { label:'DA VEDERE',  data:[...watchlist].sort((a,b)=>(b.year||0)-(a.year||0)) },
    ]) {
      if (!data.length) continue;
      if (y > H-M-30) { doc.addPage(); y=M; }
      doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(139,26,26);
      doc.text(label, M, y); y+=14; doc.setTextColor(30);
      for (const it of data) {
        if (y > H-M-20) { doc.addPage(); y=M; }
        doc.setFont('helvetica','bold'); doc.setFontSize(10);
        const tl = doc.splitTextToSize(`${it.favorite?'* ':'  '}${it.title}${it.year?' ('+it.year+')':''}`, W-2*M);
        doc.text(tl, M, y); y+=tl.length*12;
        const sub = [it.directors, it.originalTitle!==it.title?it.originalTitle:'', it.recommendedBy?'Cons. da: '+it.recommendedBy:''].filter(Boolean).join(' · ');
        if (sub) {
          doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(120);
          const sl = doc.splitTextToSize(sub, W-2*M); doc.text(sl, M, y); y+=sl.length*11; doc.setTextColor(30);
        }
        y+=4;
      }
      y+=8;
    }
    doc.save('cinemino.pdf');
    setMenuOpen(false); showToast('PDF esportato');
  };

  const handleImport = e => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const text = reader.result.trim();
      const isJson = text.startsWith('[') || text.startsWith('{');
      try {
        const existingImdb = new Set(items.map(i=>i.imdbId).filter(Boolean));
        const existingIds  = new Set(items.map(i=>i.id).filter(Boolean));
        const toAdd = []; let imported=0, skipped=0;
        const processItem = raw => {
          if (!raw?.title) return;
          const imdbId = raw.imdbId||raw.imdb_id||raw.imdb||'';
          if (imdbId && existingImdb.has(imdbId)) { skipped++; return; }
          let id = raw.id||imdbId||uid(); if (existingIds.has(id)) id=uid();
          existingIds.add(id); if (imdbId) existingImdb.add(imdbId);
          toAdd.push({ id, imdbId, qid:raw.qid||'', title:raw.title, originalTitle:raw.originalTitle||raw.original_title||'', year:raw.year?parseInt(raw.year,10):null, directors:raw.directors||raw.director||'', genres:raw.genres||'', runtime:raw.runtime?parseInt(raw.runtime,10):null, imdbRating:raw.imdbRating?parseFloat(raw.imdbRating):null, createdAt:raw.createdAt||new Date().toISOString().slice(0,10), type:raw.type||'Film', favorite:!!raw.favorite, recommendedBy:raw.recommendedBy||'' });
          imported++;
        };
        if (isJson) {
          const parsed = JSON.parse(text);
          const arr = Array.isArray(parsed) ? parsed : Array.isArray(parsed.items) ? parsed.items : null;
          if (!arr) throw new Error('formato JSON non riconosciuto');
          arr.forEach(processItem);
        } else {
          const rows = parseCSV(text); if (!rows.length) throw new Error('vuoto');
          const h = rows[0].map(x=>x.trim());
          const idx = n => h.findIndex(x=>x.toLowerCase()===n.toLowerCase());
          const ti=idx('Title')>=0?idx('Title'):idx('Titolo'), oi=idx('Original Title')>=0?idx('Original Title'):idx('Titolo originale');
          const yi=idx('Year')>=0?idx('Year'):idx('Anno'), di=idx('Directors')>=0?idx('Directors'):idx('Regia');
          const gi=idx('Genres')>=0?idx('Genres'):idx('Generi'), tyi=idx('Title Type')>=0?idx('Title Type'):idx('Tipo');
          const ri=idx('Runtime (mins)')>=0?idx('Runtime (mins)'):idx('Durata (min)'), rti=idx('IMDb Rating')>=0?idx('IMDb Rating'):idx('IMDb');
          const ci=idx('Created')>=0?idx('Created'):idx('Aggiunto il'), fi=idx('Preferito'), imi=idx('Const')>=0?idx('Const'):idx('IMDb ID'), reci=idx('Consigliato da');
          if (ti<0) throw new Error('colonna Title mancante');
          for (let r=1;r<rows.length;r++) {
            const row=rows[r]; if (!row||!row[ti]) continue;
            processItem({ imdbId:imi>=0?row[imi]:'', title:row[ti], originalTitle:oi>=0?row[oi]:'', year:yi>=0?row[yi]:null, directors:di>=0?row[di]:'', genres:gi>=0?row[gi]:'', type:tyi>=0?row[tyi]:'Film', runtime:ri>=0?row[ri]:null, imdbRating:rti>=0?row[rti]:null, createdAt:ci>=0?row[ci]:'', favorite:fi>=0?/^(si|sì|yes|true|1)$/i.test(row[fi]||''):false, recommendedBy:reci>=0?row[reci]:'' });
          }
        }
        setItems(prev => {
          // Recompute against the most current state (prev) to avoid races
          // when imports are triggered in quick succession.
          const liveImdb = new Set(prev.map(i => i.imdbId).filter(Boolean));
          const liveIds  = new Set(prev.map(i => i.id).filter(Boolean));
          const filtered = toAdd.filter(it => {
            if (it.imdbId && liveImdb.has(it.imdbId)) return false;
            if (liveIds.has(it.id)) it.id = uid();
            liveIds.add(it.id);
            if (it.imdbId) liveImdb.add(it.imdbId);
            return true;
          });
          return [...filtered, ...prev];
        });
        showToast(`Importati ${imported}${skipped?`, ${skipped} già presenti`:''}`);
      } catch (err) { showToast('Errore: '+err.message); }
    };
    reader.readAsText(file,'utf-8');
    e.target.value='';
    setMenuOpen(false);
  };

  const resetAll = () => {
    if (!confirm('Svuotare la libreria? Operazione irreversibile.')) return;
    setItems([]); setMenuOpen(false); showToast('Libreria svuotata');
  };

  return (
    <div className="app">
      <Header onMenu={()=>setMenuOpen(true)} onAdd={openAdd} />
      <Tabs tab={tab} setTab={setTab} filmCount={films.length} dvCount={watchlist.length} />
      <Toolbar query={query} setQuery={setQuery} favOnly={favOnly} setFavOnly={setFavOnly}
               sortMode={sortMode} setSortMode={setSortMode} showFavFilter={tab==='film'} />

      {visible.length === 0 ? (
        <div className="no-results">
          {query || (tab==='film' && favOnly) ? 'Nessun risultato'
            : tab==='film' ? 'Nessun film ancora.' : 'Lista vuota. Aggiungi un film da vedere!'}
        </div>
      ) : (
        <div className="list">
          {visible.map(it => <ItemCard key={it.id} item={it} onClick={()=>setDetailItem(it)} onFav={()=>toggleFav(it.id)} onCheck={()=>markAsWatched(it)} />)}
        </div>
      )}

      {detailItem && !editOpen && (
        <DetailView item={detailItem} onClose={closeDetail} onEdit={openEditFromDetail}
                    onToggleFav={toggleFavInDetail} onDelete={()=>deleteItem(detailItem.id)}
                    onMarkWatched={()=>markAsWatched(detailItem)} />
      )}
      {editOpen && (
        <EditSheet initial={editing} defaultIsDV={!editing && tab==='davedere'}
                   onClose={closeEdit} onSave={saveItem}
                   onDelete={editing ? ()=>deleteItem(editing.id) : null} />
      )}
      {menuOpen && (
        <MenuSheet onClose={()=>setMenuOpen(false)} onExportCSV={exportCSV} onExportPDF={exportPDF}
                   onExportJSON={exportJSON} onImport={()=>fileInputRef.current?.click()}
                   onStats={()=>{setMenuOpen(false);setStatsOpen(true);}} onReset={resetAll} total={items.length} />
      )}
      {statsOpen && <StatsSheet items={items} films={films} watchlist={watchlist} onClose={()=>setStatsOpen(false)} />}

      <input ref={fileInputRef} type="file" accept=".csv,.json,text/csv,application/json"
             style={{display:'none'}} onChange={handleImport} />
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

/* ── Header ── */
function Header({ onMenu, onAdd }) {
  return (
    <div className="header">
      <div className="header-inner">
        <span className="brand">
          <img className="brand-mark" src={BRAND_MARK_SRC} alt="" />
          Cinemino
        </span>
        <div className="header-actions">
          <button className="icon-btn icon-btn-primary" onClick={onAdd} aria-label="Aggiungi titolo"><Icon.Plus /></button>
          <button className="icon-btn" onClick={onMenu} aria-label="Menu"><Icon.Menu /></button>
        </div>
      </div>
    </div>
  );
}

/* ── Tabs ── */
function Tabs({ tab, setTab, filmCount, dvCount }) {
  return (
    <div className="tabs">
      <button className={`tab ${tab==='film'?'active':''}`} onClick={()=>setTab('film')}>
        Film <span className="tab-count">{filmCount}</span>
      </button>
      <button className={`tab ${tab==='davedere'?'active':''}`} onClick={()=>setTab('davedere')}>
        Da vedere <span className="tab-count">{dvCount}</span>
      </button>
    </div>
  );
}

/* ── Toolbar ── */
function Toolbar({ query, setQuery, favOnly, setFavOnly, sortMode, setSortMode, showFavFilter }) {
  const labels = { anno:'Anno', alfa:'A–Z', recenti:'Recenti' };
  const cycle  = () => { const o=['anno','alfa','recenti']; setSortMode(o[(o.indexOf(sortMode)+1)%o.length]); };
  return (
    <div className="toolbar">
      <div className="search-box">
        <Icon.Search />
        <input type="search" placeholder="Cerca titolo, regia…" value={query} onChange={e=>setQuery(e.target.value)} />
      </div>
      <button className="chip-btn" onClick={cycle} aria-label="Ordinamento"><Icon.Sort /><span>{labels[sortMode]}</span></button>
      {showFavFilter && (
        <button className={`chip-btn ${favOnly?'active':''}`} onClick={()=>setFavOnly(v=>!v)} aria-label="Solo preferiti">
          <Icon.Heart filled={favOnly} />
        </button>
      )}
    </div>
  );
}

/* ── ItemCard ── */
function ItemCard({ item, onClick, onFav, onCheck }) {
  const dv = isDaVedere(item);
  return (
    <div className="card" onClick={onClick}>
      <div className="card-body">
        <div className="card-title">{item.title}</div>
        {(item.year || item.directors || item.recommendedBy) && (
          <div className="card-meta">
            {item.year && <span className="year">{item.year}</span>}
            {item.year && (item.directors || item.recommendedBy) && <span className="dot">·</span>}
            {dv && item.recommendedBy
              ? <span className="rec">👤 {item.recommendedBy}</span>
              : item.directors ? <span className="dir">{item.directors}</span> : null}
          </div>
        )}
      </div>
      {dv ? (
        <button className="card-check" onClick={e=>{e.stopPropagation();onCheck();}} aria-label="Segna come visto">
          <Icon.Check />
        </button>
      ) : (
        <button className={`card-heart ${item.favorite?'on':''}`} onClick={e=>{e.stopPropagation();onFav();}} aria-label="Preferito">
          <Icon.Heart filled={item.favorite} />
        </button>
      )}
    </div>
  );
}

/* ── DetailView ── */
function DetailView({ item, onClose, onEdit, onToggleFav, onDelete, onMarkWatched }) {
  const dv = isDaVedere(item);
  const fmtDate = s => { try { const d=new Date(s); return isNaN(d)?null:d.toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'}); } catch{return null;} };
  const dateStr = fmtDate(item.createdAt);
  return (
    <div className="page">
      <div className="page-header">
        <button className="page-header-btn" onClick={onClose}>← Indietro</button>
        <div className="page-title">Dettaglio</div>
        <button className="page-header-btn primary" onClick={onEdit}>Modifica</button>
      </div>
      <div className="page-body detail-body">
        <div className="detail-hero">
          <div className="detail-hero-text">
            <h1 className="detail-title">{item.title}</h1>
            {item.originalTitle && item.originalTitle!==item.title && <div className="detail-orig">{item.originalTitle}</div>}
          </div>
          {!dv && (
            <button className={`detail-fav ${item.favorite?'on':''}`} onClick={onToggleFav} aria-label="Preferito">
              <Icon.Heart filled={item.favorite} />
            </button>
          )}
        </div>

        {dv && <button className="btn-watch" onClick={onMarkWatched}><Icon.Eye /> Segna come visto</button>}

        <div className="detail-rows">
          <div className="detail-row"><span className="detail-row-label">Tipologia</span><span className="detail-row-value">{dv?'Da vedere':'Film'}</span></div>
          {item.year     && <div className="detail-row"><span className="detail-row-label">Anno</span><span className="detail-row-value">{item.year}</span></div>}
          {item.directors&& <div className="detail-row"><span className="detail-row-label">Regia</span><span className="detail-row-value">{item.directors}</span></div>}
          {dv && item.recommendedBy && <div className="detail-row"><span className="detail-row-label">Consigliato da</span><span className="detail-row-value">{item.recommendedBy}</span></div>}
          {item.genres   && <div className="detail-row"><span className="detail-row-label">Generi</span><span className="detail-row-value">{item.genres}</span></div>}
          {item.runtime  && <div className="detail-row"><span className="detail-row-label">Durata</span><span className="detail-row-value">{item.runtime} min</span></div>}
          {item.imdbRating&&<div className="detail-row"><span className="detail-row-label">IMDb</span><span className="detail-row-value">{item.imdbRating.toFixed(1)}</span></div>}
        </div>

        {dateStr && <div className="detail-foot">aggiunto il {dateStr}</div>}

        <div style={{padding:'0 22px 22px', marginTop:16}}>
          <button className="btn btn-danger-ghost" onClick={()=>{if(confirm('Eliminare questo titolo?')) onDelete();}} style={{padding:'10px 0'}}>
            <Icon.Trash /> Elimina
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── EditSheet ── */
function EditSheet({ initial, defaultIsDV, onClose, onSave, onDelete }) {
  const [title, setTitle]           = useState(initial?.title||'');
  const [originalTitle, setOriginalTitle] = useState(initial?.originalTitle||'');
  const [year, setYear]             = useState(initial?.year||'');
  const [directors, setDirectors]   = useState(initial?.directors||'');
  const [recommendedBy, setRecommendedBy] = useState(initial?.recommendedBy||'');
  const [favorite, setFavorite]     = useState(initial?.favorite||false);
  const [isWL, setIsWL]             = useState(initial ? isDaVedere(initial) : !!defaultIsDV);
  const [imdbId, setImdbId]         = useState(initial?.imdbId||'');
  const [qid, setQid]               = useState(initial?.qid||'');
  const [liveEnabled, setLiveEnabled] = useState(!initial);
  const [suggestions, setSuggestions]= useState([]);
  const [loadingSug, setLoadingSug] = useState(false);
  const [showSug, setShowSug]       = useState(false);
  const [fetchingDir, setFetchingDir]= useState(false);
  const [searchError, setSearchError]= useState('');
  const debounced  = useDebounced(title, 450);
  const lastQ      = useRef(initial?(initial.title||'').trim():'');
  const reqId      = useRef(0);

  useEffect(() => {
    if (!liveEnabled) return;
    const q = debounced.trim();
    if (q.length < 2) { setSuggestions([]); setShowSug(false); setSearchError(''); return; }
    if (q === lastQ.current) return;
    lastQ.current = q;
    setSearchError(''); setLoadingSug(true); setShowSug(true);
    const myId = ++reqId.current;
    searchFilms(q).then(results => {
      if (myId!==reqId.current) return;
      setSuggestions(results); setLoadingSug(false);
      if (!results.length) setSearchError('Nessun risultato trovato');
    }).catch(() => { if (myId!==reqId.current) return; setLoadingSug(false); setSearchError('Errore di rete, riprova'); });
  }, [debounced, liveEnabled]);

  const pickSuggestion = async s => {
    setTitle(s.title); setOriginalTitle(s.title);
    if (s.year) setYear(s.year); if (s.imdbId) setImdbId(s.imdbId); if (s.qid) setQid(s.qid);
    setShowSug(false); setSuggestions([]); setLiveEnabled(false); setSearchError('');
    if (s.directors) { setDirectors(s.directors); }
    else if (s.imdbId) {
      setFetchingDir(true);
      try { const d = await fetchDirectorFromWikidata(s.imdbId); if(d) setDirectors(d); } catch{}
      finally { setFetchingDir(false); }
    }
  };

  const manualSearch = async () => {
    const q = title.trim(); if (!q) return;
    setLiveEnabled(true); setShowSug(true); lastQ.current=''; setLoadingSug(true); setSearchError('');
    const myId = ++reqId.current;
    try {
      const results = await searchFilms(q);
      if (myId!==reqId.current) return;
      setSuggestions(results); setLoadingSug(false);
      if (!results.length) setSearchError('Nessun risultato trovato');
    } catch { if (myId!==reqId.current) return; setLoadingSug(false); setSearchError('Errore di rete'); }
  };

  const onTitleChange = v => {
    setTitle(v); if (!liveEnabled) setLiveEnabled(true);
    if (!v.trim()) { setShowSug(false); setSearchError(''); }
  };

  useEffect(() => {
    if (!showSug) return;
    const h = e => { if (!e.target.closest('.input-with-btn')) setShowSug(false); };
    document.addEventListener('click', h);
    return () => document.removeEventListener('click', h);
  }, [showSug]);

  const canSave = title.trim().length > 0;

  const submit = () => {
    if (!canSave) return;
    onSave({
      id: initial?.id,
      imdbId: imdbId||initial?.imdbId||'', qid: qid||initial?.qid||'',
      title: title.trim(), originalTitle: originalTitle.trim(),
      year: year ? parseInt(year,10) : null,
      directors: directors.trim(),
      recommendedBy: isWL ? recommendedBy.trim() : '',
      favorite: isWL ? false : favorite,
      isDaVedere: isWL,
      genres: initial?.genres||'', runtime: initial?.runtime||null, imdbRating: initial?.imdbRating||null,
    });
  };

  return (
    <div className="page" onClick={e=>e.stopPropagation()}>
      <div className="page-header">
        <button className="page-header-btn" onClick={onClose}>Annulla</button>
        <div className="page-title">{initial?'Modifica':isWL?'Da vedere':'Nuovo film'}</div>
        <button className="page-header-btn primary" onClick={submit} disabled={!canSave}>{initial?'Salva':'Aggiungi'}</button>
      </div>
      <div className="page-body">
        {/* Tipo */}
        <div className="field">
          <label>Tipologia</label>
          <div style={{display:'flex',gap:8}}>
            <button type="button" className={`chip-btn ${!isWL?'active':''}`} style={{flex:1,justifyContent:'center',padding:'11px'}} onClick={()=>setIsWL(false)}>Film visto</button>
            <button type="button" className={`chip-btn ${isWL?'active':''}`}  style={{flex:1,justifyContent:'center',padding:'11px'}} onClick={()=>setIsWL(true)}>Da vedere</button>
          </div>
        </div>

        {/* Titolo + ricerca */}
        <div className="field">
          <label>Titolo</label>
          <div className="input-with-btn">
            <input className="input" value={title} onChange={e=>onTitleChange(e.target.value)}
                   placeholder="es. Metropolis" autoFocus={!initial} autoComplete="off" autoCorrect="off" spellCheck="false"
                   onFocus={()=>title.trim().length>=2&&suggestions.length&&setShowSug(true)} />
            <button type="button" className="search-btn" onClick={manualSearch} disabled={!title.trim()||loadingSug}>
              {loadingSug ? <span className="spin"/> : <Icon.Sparkle />}
              <span>Cerca</span>
            </button>
            {showSug && (
              <div className="suggestions" onClick={e=>e.stopPropagation()}>
                {loadingSug && <div className="sugg-loading"><span className="spin" style={{verticalAlign:'middle',marginRight:8}}/>Ricerca in corso…</div>}
                {!loadingSug && searchError && <div className="sugg-empty">{searchError}</div>}
                {!loadingSug && !searchError && suggestions.map((s,i) => (
                  <div key={`${s.id||'x'}-${i}`} className="sugg-item" onClick={()=>pickSuggestion(s)}>
                    <div className="sugg-body">
                      <div className="sugg-title">{s.title}</div>
                      <div className="sugg-meta">{s.year||'—'}{s.directors&&<span> · {s.directors.length>40?s.directors.slice(0,38)+'…':s.directors}</span>}{!s.directors&&s.stars&&<span> · {s.stars}</span>}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
          {fetchingDir && <div className="sugg-dir-fetch"><span className="spin"/> Ricerca regista…</div>}
        </div>

        {/* Titolo originale */}
        <div className="field">
          <label>Titolo originale <span style={{opacity:.5,textTransform:'none',letterSpacing:0}}>(facoltativo)</span></label>
          <input className="input" value={originalTitle} onChange={e=>setOriginalTitle(e.target.value)} placeholder="es. Metropolis" />
        </div>

        {/* Anno + Regia */}
        <div className="inline-row">
          <div className="field">
            <label>Anno</label>
            <input className="input" type="number" inputMode="numeric" value={year} onChange={e=>setYear(e.target.value)} placeholder="es. 1927" />
          </div>
          <div className="field" style={{flex:2}}>
            <label>Regia</label>
            <input className="input" value={directors} onChange={e=>setDirectors(e.target.value)} placeholder="es. Fritz Lang" />
          </div>
        </div>

        {/* Consigliato da (solo Da vedere) */}
        {isWL && (
          <div className="field">
            <label>Consigliato da <span style={{opacity:.5,textTransform:'none',letterSpacing:0}}>(facoltativo)</span></label>
            <input className="input" value={recommendedBy} onChange={e=>setRecommendedBy(e.target.value)} placeholder="es. Marco, Luca…" />
          </div>
        )}

        {/* Preferito (solo Film visto) */}
        {!isWL && (
          <div className="field">
            <button type="button" className={`chip-btn ${favorite?'active':''}`} style={{padding:'11px 14px'}} onClick={()=>setFavorite(v=>!v)}>
              <Icon.Heart filled={favorite} /> {favorite?'Tra i preferiti':'Aggiungi ai preferiti'}
            </button>
          </div>
        )}

        {/* Elimina */}
        {onDelete && (
          <div style={{marginTop:28,paddingTop:18,borderTop:'1px solid var(--line)'}}>
            <button className="btn btn-danger-ghost" onClick={()=>{if(confirm('Eliminare questo titolo?')) onDelete();}} style={{padding:'10px 0'}}>
              <Icon.Trash /> Elimina
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── MenuSheet ── */
function MenuSheet({ onClose, onExportCSV, onExportPDF, onExportJSON, onImport, onStats, onReset, total }) {
  return (
    <>
      <div className="backdrop" onClick={onClose} />
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle" />
        <div className="sheet-header"><div className="sheet-title">Menu</div><button className="icon-btn" onClick={onClose}><Icon.Close /></button></div>
        <div className="sheet-body">
          {[
            { icon:<Icon.Chart/>,    label:'Statistiche',   sub:`${total} titoli in libreria`, action:onStats,     chevron:true },
            { icon:<Icon.Upload/>,   label:'Importa file',  sub:'JSON di Cinemino o CSV',      action:onImport },
            { icon:<Icon.Download/>, label:'Esporta JSON',  sub:'Backup completo',             action:onExportJSON },
            { icon:<Icon.Download/>, label:'Esporta CSV',   sub:'Per fogli di calcolo',        action:onExportCSV },
            { icon:<Icon.Download/>, label:'Esporta PDF',   sub:'Elenco stampabile',           action:onExportPDF },
          ].map(({icon,label,sub,action,chevron}) => (
            <button key={label} className="menu-item" onClick={action}>
              {icon}<div style={{flex:1}}><div>{label}</div><div className="menu-item-sub">{sub}</div></div>
              {chevron && <Icon.Chevron />}
            </button>
          ))}
          <button className="menu-item menu-item-danger" onClick={onReset}>
            <Icon.Trash /><div style={{flex:1}}><div>Svuota libreria</div><div className="menu-item-sub">Elimina tutti i titoli</div></div>
          </button>
        </div>
      </div>
    </>
  );
}

/* ── StatsSheet ── */
function StatsSheet({ items, films, watchlist, onClose }) {
  const favs = items.filter(i => i.favorite);

  const byDecade = {};
  films.forEach(f => { if (!f.year) return; const d = Math.floor(f.year/10)*10; byDecade[d]=(byDecade[d]||0)+1; });
  const decades  = Object.entries(byDecade).sort((a,b)=>a[0]-b[0]);
  const maxDec   = Math.max(1,...decades.map(([,n])=>n));

  const dirCount = {};
  films.forEach(f => { (f.directors||'').split(',').map(s=>s.trim()).filter(Boolean).forEach(d=>{ dirCount[d]=(dirCount[d]||0)+1; }); });
  const topDirs  = Object.entries(dirCount).sort((a,b)=>b[1]-a[1]).slice(0,8);

  const recCount = {};
  watchlist.forEach(f => { (f.recommendedBy||'').split(',').map(s=>s.trim()).filter(Boolean).forEach(r=>{ recCount[r]=(recCount[r]||0)+1; }); });
  const topRec   = Object.entries(recCount).sort((a,b)=>b[1]-a[1]).slice(0,5);

  return (
    <>
      <div className="backdrop" onClick={onClose} />
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle" />
        <div className="sheet-header"><div className="sheet-title">Statistiche</div><button className="icon-btn" onClick={onClose}><Icon.Close /></button></div>
        <div className="sheet-body">
          <div className="stats-grid">
            <div className="stat"><div className="stat-num">{films.length}</div><div className="stat-label">Film visti</div></div>
            <div className="stat"><div className="stat-num">{watchlist.length}</div><div className="stat-label">Da vedere</div></div>
            <div className="stat"><div className="stat-num">{favs.length}</div><div className="stat-label">Preferiti</div></div>
            <div className="stat"><div className="stat-num">{new Set(films.flatMap(i=>(i.directors||'').split(',').map(s=>s.trim()).filter(Boolean))).size}</div><div className="stat-label">Registi</div></div>
          </div>

          {decades.length > 0 && <>
            <div className="divider-label" style={{padding:'22px 0 8px'}}>Film per decennio</div>
            {decades.map(([dec,n]) => (
              <div key={dec} style={{display:'flex',alignItems:'center',gap:10,padding:'5px 0',fontVariantNumeric:'tabular-nums'}}>
                <div style={{width:52,fontSize:13,color:'var(--ink-soft)',fontWeight:500}}>{dec}s</div>
                <div style={{flex:1,background:'var(--line)',height:8,borderRadius:4,overflow:'hidden'}}>
                  <div style={{width:`${n/maxDec*100}%`,height:'100%',background:'var(--accent)',borderRadius:4}}/>
                </div>
                <div style={{width:36,textAlign:'right',fontSize:13,color:'var(--muted)'}}>{n}</div>
              </div>
            ))}
          </>}

          {topDirs.length > 0 && <>
            <div className="divider-label" style={{padding:'22px 0 8px'}}>Registi più visti</div>
            {topDirs.map(([name,n]) => (
              <div key={name} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--line)',fontSize:14}}>
                <span style={{fontFamily:'Fraunces,serif',fontStyle:'italic'}}>{name}</span>
                <span style={{color:'var(--muted)',fontVariantNumeric:'tabular-nums'}}>{n}</span>
              </div>
            ))}
          </>}

          {topRec.length > 0 && <>
            <div className="divider-label" style={{padding:'22px 0 8px'}}>Chi consiglia di più</div>
            {topRec.map(([name,n]) => (
              <div key={name} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--line)',fontSize:14}}>
                <span>👤 {name}</span>
                <span style={{color:'var(--muted)',fontVariantNumeric:'tabular-nums'}}>{n} film</span>
              </div>
            ))}
          </>}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
