<style>
:root {
  --bg: #f6f1e8;
  --bg-elev: #fdf9f2;
  --ink: #1a1410;
  --ink-soft: #4a3f36;
  --muted: #8a7d6e;
  --line: #e4d7bf;
  --line-strong: #d4c4a8;
  --accent: #8b1a1a;
  --accent-soft: #b04040;
  --accent-bg: #f3e4e4;
  --heart: #c42b2b;
  --success: #4a6b3a;
  --avatar-bg: linear-gradient(145deg, #3a2820, #1f1410);
  --avatar-fg: #e4c888;
  --shadow-sm: 0 1px 2px rgba(26,20,16,.06);
  --shadow: 0 4px 16px rgba(26,20,16,.08);
  --shadow-lg: 0 20px 50px rgba(26,20,16,.18);
  --r-sm: 8px;
  --r: 12px;
  --r-lg: 18px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #14100d;
    --bg-elev: #1d1814;
    --ink: #f1ead9;
    --ink-soft: #c8bca6;
    --muted: #8a7d6e;
    --line: #2d2520;
    --line-strong: #3d342c;
    --accent: #d44545;
    --accent-soft: #e36868;
    --accent-bg: #3a1818;
    --heart: #e64545;
    --avatar-bg: linear-gradient(145deg, #4a3225, #28180f);
    --avatar-fg: #e4c888;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
    --shadow: 0 4px 16px rgba(0,0,0,.5);
    --shadow-lg: 0 20px 50px rgba(0,0,0,.65);
  }
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); overscroll-behavior-y: none; }
body {
  font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  min-height: 100dvh;
}
button, input, textarea, select { font: inherit; color: inherit; }
button { background: none; border: 0; cursor: pointer; padding: 0; }
input, textarea { -webkit-appearance: none; appearance: none; }

.brand-serif { font-family: 'Fraunces', 'Times New Roman', serif; font-optical-sizing: auto; }

/* ---------- Shell ---------- */
.app {
  max-width: 560px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  position: relative;
  padding-bottom: calc(24px + var(--safe-bot));
}

/* ---------- Header ---------- */
.header {
  position: sticky;
  top: 0;
  z-index: 30;
  background: var(--bg);
  padding-top: var(--safe-top);
  border-bottom: 1px solid var(--line);
}
.header-inner {
  padding: 14px 18px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.brand {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 28px;
  letter-spacing: -0.015em;
  font-variation-settings: "opsz" 72, "SOFT" 30;
  color: var(--ink);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.brand-mark {
  width: 30px;
  height: 30px;
  flex-shrink: 0;
  display: block;
}
@media (prefers-color-scheme: dark) {
  .brand-mark { filter: brightness(1.45) saturate(1.1); }
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 4px;
}
.icon-btn-primary {
  background: var(--accent);
  color: #fff;
}
.icon-btn-primary:hover, .icon-btn-primary:active {
  background: var(--accent-soft);
}
.icon-btn-primary svg { width: 22px; height: 22px; }
.icon-btn {
  width: 40px; height: 40px;
  border-radius: 999px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--ink);
  transition: background .15s;
}
.icon-btn:hover, .icon-btn:active { background: var(--line); }
.icon-btn svg { width: 20px; height: 20px; }

/* ---------- Tabs ---------- */
.tabs {
  display: flex;
  padding: 0 14px;
  gap: 4px;
}
.tab {
  flex: 1;
  padding: 10px 12px 12px;
  font-size: 14px;
  font-weight: 500;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  text-align: center;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: color .15s, border-color .15s;
}
.tab-count {
  font-size: 11px;
  background: var(--line);
  color: var(--ink-soft);
  padding: 1px 7px;
  border-radius: 999px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.tab.active { color: var(--ink); border-bottom-color: var(--accent); }
.tab.active .tab-count { background: var(--accent); color: #fff; }

/* ---------- Search / Filters ---------- */
.toolbar {
  display: flex; gap: 8px; align-items: center;
  padding: 12px 16px 10px;
}
.search-box {
  flex: 1;
  position: relative;
}
.search-box input {
  width: 100%;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 10px 14px 10px 38px;
  font-size: 14px;
  outline: none;
  transition: border-color .15s;
}
.search-box input:focus { border-color: var(--accent-soft); }
.search-box svg {
  position: absolute;
  left: 12px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; color: var(--muted);
}
.chip-btn {
  padding: 9px 12px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--bg-elev);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-soft);
  display: inline-flex; align-items: center; gap: 5px;
  white-space: nowrap;
  transition: all .15s;
}
.chip-btn.active {
  background: var(--accent-bg);
  border-color: var(--accent-soft);
  color: var(--accent);
}
.chip-btn svg { width: 14px; height: 14px; }

/* ---------- List ---------- */
.list { padding: 4px 12px 20px; }
.card {
  display: flex;
  gap: 14px;
  padding: 14px 12px;
  border-bottom: 1px solid var(--line);
  align-items: center;
  cursor: pointer;
  transition: background .15s;
}
.card:hover { background: var(--bg-elev); }
.card-avatar {
  width: 44px; height: 56px;
  flex-shrink: 0;
  border-radius: 4px;
  background: var(--avatar-bg);
  color: var(--avatar-fg);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 22px;
  font-style: italic;
  box-shadow: inset 0 -20px 20px -20px rgba(255,220,150,.2);
  position: relative;
  overflow: hidden;
}
.card-avatar::after {
  content: "";
  position: absolute;
  inset: 3px;
  border: 1px solid rgba(228,200,136,.25);
  border-radius: 2px;
  pointer-events: none;
}
.card-avatar-img { background: var(--line); }
.card-avatar-img::after { display: none; }
.card-avatar-img img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 4px; }
.card-body { flex: 1; min-width: 0; }
.card-title {
  font-weight: 600;
  font-size: 17px;
  color: var(--ink);
  line-height: 1.25;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  letter-spacing: -0.005em;
}
.card-meta {
  font-size: 13px;
  color: var(--ink-soft);
  margin-top: 4px;
  display: flex; gap: 6px; align-items: center;
  font-variant-numeric: tabular-nums;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.card-meta .year { font-weight: 500; }
.card-meta .dot { color: var(--line-strong); }
.card-meta .dir { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-style: italic; font-family: 'Fraunces', serif; color: var(--muted); }
.card-heart {
  flex-shrink: 0;
  padding: 8px;
  margin: -8px -4px -8px 0;
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
}
.card-heart svg { width: 20px; height: 20px; transition: transform .15s; }
.card-heart.on { color: var(--heart); }
.card-heart.on svg { transform: scale(1.08); }
.card-heart:active svg { transform: scale(.85); }

/* ---------- Empty ---------- */
.empty {
  text-align: center;
  padding: 60px 30px;
  color: var(--muted);
}
.empty-title {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 20px;
  color: var(--ink-soft);
  margin-bottom: 6px;
}

/* ---------- FAB ---------- */
.fab {
  position: fixed;
  right: max(18px, calc((100vw - 560px) / 2 + 18px));
  bottom: calc(22px + var(--safe-bot));
  width: 56px; height: 56px;
  border-radius: 999px;
  background: var(--accent);
  color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 24px rgba(139,26,26,.36), 0 2px 6px rgba(26,20,16,.14);
  z-index: 20;
  transition: transform .15s;
}
.fab:active { transform: scale(.92); }
.fab svg { width: 24px; height: 24px; }

/* ---------- Sheet / Modal ---------- */
.backdrop {
  position: fixed; inset: 0;
  background: rgba(26,20,16,.45);
  z-index: 100;
  opacity: 0;
  animation: fadeIn .18s forwards;
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
}
@keyframes fadeIn { to { opacity: 1; } }
.sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  background: var(--bg);
  border-radius: 22px 22px 0 0;
  z-index: 101;
  max-width: 560px;
  margin: 0 auto;
  max-height: 92dvh;
  max-height: 92vh;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  animation: slideUp .26s cubic-bezier(.2,.7,.2,1) forwards;
  padding-bottom: var(--safe-bot);

/* ---------- Suggestions dropdown ---------- */

}
.sugg-body { flex: 1; min-width: 0; }
.sugg-title {
  font-size: 14px; font-weight: 500; color: var(--ink);

/* spinner */
.spin { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--line-strong); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ---------- Menu sheet items ---------- */

  display: flex; align-items: center; gap: 14px;

/* ---------- Toast ---------- */
.toast {

  transform: translateX(-50%);

  border-radius: 999px;

  font-weight: 500;

}

}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } }

/* misc */

/* iOS safari sticky header paint fix */
@supports (-webkit-touch-callout: none) {
  .header { transform: translateZ(0); }
}

<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ================== SEED DATA ================== */
const SEED = [];

/* ================== STORAGE ================== */
const STORAGE_KEY = "cinemino.v1";

function loadItems() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* ignore */ }
  return null;
}
function saveItems(items) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }
  catch (e) { /* quota or blocked */ }
}

/* ================== UTIL ================== */
const uid = () => "l-" + Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4);
const norm = (s) => (s||"").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
const firstLetter = (s) => {
  const t = (s||"").trim();
  if (!t) return "?";
  const c = t[0].toUpperCase();
  return /[A-Z0-9]/.test(c) ? c : t[0];
};

function csvEscape(v) {
  if (v == null) return "";
  const s = String(v);
  if (/[",\n]/.test(s)) return `"${s.replace(/"/g,'""')}"`;
  return s;
}

function parseCSV(text) {
  const rows = [];
  let row = [], field = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"') { if (text[i+1] === '"') { field += '"'; i++; } else inQ = false; }
      else field += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(field); field = ""; }
      else if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ""; }
      else if (ch === '\r') { /* skip */ }
      else field += ch;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows;
}

/* ================== API: Wikidata (primary) + IMDb fallback ==================
   Wikidata SPARQL gives us title+year+director+imdbId in a single CORS-enabled request.
   IMDb suggestion (unofficial) is used only as fallback if Wikidata returns nothing. */

async function fetchWikidataSuggestions(query) {
  const safe = query.replace(/\\/g, "\\\\").replace(/"/g, '\\"');
  const sparql = `SELECT ?item ?itemLabel ?year (GROUP_CONCAT(DISTINCT ?dirLabel; separator=", ") AS ?directors) ?imdb ?image WHERE {
  SERVICE wikibase:mwapi {
    bd:serviceParam wikibase:endpoint "www.wikidata.org" .
    bd:serviceParam wikibase:api "EntitySearch" .
    bd:serviceParam mwapi:search "${safe}" .
    bd:serviceParam mwapi:language "it" .
    ?item wikibase:apiOutputItem mwapi:item .
  }
  ?item wdt:P31/wdt:P279* wd:Q11424 .
  OPTIONAL { ?item wdt:P577 ?date . BIND(YEAR(?date) AS ?year) }
  OPTIONAL {
    ?item wdt:P57 ?dir .
    ?dir rdfs:label ?dirLabel .
    FILTER(LANG(?dirLabel) = "it" || LANG(?dirLabel) = "en")
  }
  OPTIONAL { ?item wdt:P345 ?imdb }
  OPTIONAL { ?item wdt:P18 ?image }
  SERVICE wikibase:label { bd:serviceParam wikibase:language "it,en" . ?item rdfs:label ?itemLabel . }
}
GROUP BY ?item ?itemLabel ?year ?imdb ?image
ORDER BY DESC(?year)
LIMIT 12`;
  const url = `https://query.wikidata.org/sparql?format=json&query=${encodeURIComponent(sparql)}`;
  try {
    const r = await fetch(url, { headers: { "Accept": "application/sparql-results+json" } });
    if (!r.ok) { console.warn("Wikidata SPARQL status", r.status); return []; }
    const data = await r.json();
    const rows = data.results?.bindings || [];
    const seen = new Set();
    const out = [];
    for (const b of rows) {
      const qid = (b.item?.value || "").split("/").pop();
      if (!qid || seen.has(qid)) continue;
      seen.add(qid);
      // Wikidata image URL is the Commons Special:FilePath redirect;
      // force https and request a 80px thumbnail
      let poster = null;
      if (b.image?.value) {
        poster = b.image.value.replace(/^http:/, "https:") + "?width=200";
      }
      out.push({
        id: b.imdb?.value || qid,
        qid,
        imdbId: b.imdb?.value || "",
        title: b.itemLabel?.value || "",
        year: b.year?.value ? parseInt(b.year.value) : null,
        directors: b.directors?.value || "",
        poster,
        source: "wikidata"
      });
    }
    return out.slice(0, 10);
  } catch (e) {
    console.warn("Wikidata error:", e);
    return [];
  }
}

async function fetchImdbSuggestions(query) {
  const q = query.trim().toLowerCase().replace(/[^a-z0-9\s]/gi, "").replace(/\s+/g, "_");
  if (!q) return [];
  const letter = q[0];
  const url = `https://v3.sg.media-imdb.com/suggestion/${letter}/${encodeURIComponent(q)}.json`;
  try {
    const r = await fetch(url);
    if (!r.ok) { console.warn("IMDb status", r.status); return []; }
    const data = await r.json();
    const items = (data.d || []).filter(d => {
      const qq = (d.qid || d.q || "").toLowerCase();
      return /movie|short|tv|video|mini|feature/i.test(qq) || d.q === "feature";
    });
    return items.slice(0, 10).map(d => ({
      id: d.id,
      qid: null,
      imdbId: d.id,
      title: d.l || "",
      year: d.y || (d.yr ? parseInt(d.yr) : null),
      directors: "", // IMDb suggestion doesn't include directors
      poster: d.i && d.i.imageUrl ? d.i.imageUrl : null,
      stars: d.s || "",
      source: "imdb"
    }));
  } catch (e) {
    console.warn("IMDb error:", e);
    return [];
  }
}

async function searchFilms(query) {
  // Try Wikidata first (returns director in-line)
  let results = await fetchWikidataSuggestions(query);
  if (results.length >= 3) return { results, source: "wikidata" };
  // Fall back to / combine with IMDb
  const imdb = await fetchImdbSuggestions(query);
  // Merge, prefer wikidata entries
  const seen = new Set(results.map(r => r.imdbId || r.qid));
  for (const it of imdb) {
    if (!seen.has(it.imdbId)) { results.push(it); seen.add(it.imdbId); }
  }
  return { results: results.slice(0, 10), source: results.length ? "mixed" : "none" };
}

async function fetchPosterFromWikidata(imdbId) {
  if (!imdbId) return null;
  const sparql = `SELECT ?image WHERE {
    ?film wdt:P345 "${imdbId}" .
    ?film wdt:P18 ?image .
  } LIMIT 1`;
  const url = `https://query.wikidata.org/sparql?format=json&query=${encodeURIComponent(sparql)}`;
  try {
    const r = await fetch(url, { headers: { "Accept": "application/sparql-results+json" } });
    if (!r.ok) return null;
    const data = await r.json();
    const v = data.results?.bindings?.[0]?.image?.value;
    if (!v) return null;
    return v.replace(/^http:/, "https:") + "?width=160";
  } catch (e) {
    return null;
  }
}

async function fetchDirectorFromWikidata(imdbId) {
  if (!imdbId) return null;
  const sparql = `SELECT (GROUP_CONCAT(DISTINCT ?dirLabel; separator=", ") AS ?directors) WHERE {
    ?film wdt:P345 "${imdbId}" .
    ?film wdt:P57 ?dir .
    ?dir rdfs:label ?dirLabel .
    FILTER(LANG(?dirLabel) = "it" || LANG(?dirLabel) = "en")
  }`;
  const url = `https://query.wikidata.org/sparql?format=json&query=${encodeURIComponent(sparql)}`;
  try {
    const r = await fetch(url, { headers: { "Accept": "application/sparql-results+json" } });
    if (!r.ok) return null;
    const data = await r.json();
    const v = data.results?.bindings?.[0]?.directors?.value;
    return v || null;
  } catch (e) {
    console.warn("Director lookup error:", e);
    return null;
  }
}

function useDebounced(value, delay) {
  const [v, setV] = useState(value);
  useEffect(() => {
    const id = setTimeout(() => setV(value), delay);
    return () => clearTimeout(id);
  }, [value, delay]);
  return v;
}

/* ================== ICONS ================== */
const Icon = {
  Search: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>,
  Plus: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>,
  Heart: ({filled}) => <svg viewBox="0 0 24 24" fill={filled?"currentColor":"none"} stroke="currentColor" strokeWidth="2" strokeLinejoin="round"><path d="M12 21s-7-4.5-9.5-9A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6C19 16.5 12 21 12 21z"/></svg>,
  Menu: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>,
  Close: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>,
  Download: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3v13M6 11l6 6 6-6M4 21h16"/></svg>,
  Upload: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 19V6M6 11l6-6 6 6M4 21h16"/></svg>,
  Trash: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>,
  Chart: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>,
  Sparkle: () => <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.8 4.8L18 8l-4.2 1.7L12 14l-1.8-4.3L6 8l4.2-1.2z"/></svg>,
  Chevron: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 6 6 6-6 6"/></svg>,
  Sort: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h13M3 12h9M3 18h5M17 4v16M17 20l-3-3M17 20l3-3"/></svg>,
};

/* ================== APP ================== */
function App() {
  const [items, setItems] = useState(() => loadItems() || SEED);
  const [tab, setTab] = useState("film"); // film | serie
  const [query, setQuery] = useState("");
  const [favOnly, setFavOnly] = useState(false);
  const [sortMode, setSortMode] = useState("recenti"); // recenti | anno | alfa
  const [editOpen, setEditOpen] = useState(false);
  const [editing, setEditing] = useState(null);
  const [menuOpen, setMenuOpen] = useState(false);
  const [statsOpen, setStatsOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const fileInputRef = useRef(null);

  useEffect(() => { saveItems(items); }, [items]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2200);
  };

  const films = useMemo(() => items.filter(i => !isSerie(i)), [items]);
  const series = useMemo(() => items.filter(i => isSerie(i)), [items]);

  const visible = useMemo(() => {
    const base = tab === "film" ? films : series;
    const q = norm(query);
    let out = base;
    if (favOnly) out = out.filter(i => i.favorite);
    if (q) out = out.filter(i =>
      norm(i.title).includes(q) ||
      norm(i.originalTitle).includes(q) ||
      norm(i.directors).includes(q)
    );
    const titleCmp = (a, b) => norm(a.title).localeCompare(norm(b.title), "it");
    if (sortMode === "anno") {
      return [...out].sort((a, b) => (b.year || 0) - (a.year || 0) || titleCmp(a, b));
    }
    if (sortMode === "alfa") {
      return [...out].sort(titleCmp);
    }
    // "recenti": favorites first, then newest createdAt, then year desc
    return [...out].sort((a,b) => {
      if ((b.favorite?1:0) !== (a.favorite?1:0)) return (b.favorite?1:0) - (a.favorite?1:0);
      const da = a.createdAt || "", db = b.createdAt || "";
      if (da !== db) return db.localeCompare(da);
      return (b.year||0) - (a.year||0);
    });
  }, [tab, films, series, query, favOnly, sortMode]);

  const openAdd = () => { setEditing(null); setEditOpen(true); };
  const openEdit = (item) => { setEditing(item); setEditOpen(true); };
  const closeEdit = () => { setEditOpen(false); setEditing(null); };

  const saveItem = (data) => {
    if (data.id) {
      setItems(prev => prev.map(i => i.id === data.id ? { ...i, ...data } : i));
      showToast("Modifiche salvate");
    } else {
      const newItem = {
        id: uid(),
        favorite: false,
        createdAt: new Date().toISOString().slice(0,10),
        type: data.isSerie ? "Serie TV" : "Film",
        ...data,
      };
      delete newItem.isSerie;
      setItems(prev => [newItem, ...prev]);
      showToast(data.isSerie ? "Serie aggiunta" : "Film aggiunto");
      setTab(data.isSerie ? "serie" : "film");
    }
    closeEdit();
  };

  const deleteItem = (id) => {
    setItems(prev => prev.filter(i => i.id !== id));
    closeEdit();
    showToast("Eliminato");
  };

  const toggleFav = (id) => {
    setItems(prev => prev.map(i => i.id === id ? { ...i, favorite: !i.favorite } : i));
  };

  /* ---------- Import / Export ---------- */
  const exportCSV = () => {
    const head = ["Tipo","Titolo","Titolo originale","Anno","Regia","Generi","Durata (min)","IMDb","IMDb ID","Preferito","Aggiunto il"];
    const rows = items.map(i => [
      isSerie(i) ? "Serie TV" : "Film",
      i.title, i.originalTitle, i.year, i.directors, i.genres, i.runtime,
      i.imdbRating, i.imdbId, i.favorite ? "si" : "",
      i.createdAt || ""
    ].map(csvEscape).join(","));
    const csv = [head.join(","), ...rows].join("\n");
    downloadBlob(csv, "cinemino.csv", "text/csv;charset=utf-8");
    setMenuOpen(false);
    showToast("CSV esportato");
  };

  const exportPDF = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "pt", format: "a4" });
    const w = doc.internal.pageSize.getWidth();
    const h = doc.internal.pageSize.getHeight();
    const margin = 40;
    let y = margin;

    doc.setFont("times", "italic");
    doc.setFontSize(26);
    doc.text("Cinemino", margin, y); y += 22;
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.setTextColor(120);
    doc.text(`${films.length} film · ${series.length} serie TV · ${items.filter(i=>i.favorite).length} preferiti`, margin, y);
    doc.text(new Date().toLocaleDateString("it-IT"), w - margin, y, { align: "right" });
    y += 18;
    doc.setDrawColor(200); doc.line(margin, y, w - margin, y); y += 14;
    doc.setTextColor(30);

    const sections = [
      { label: "FILM", data: [...films].sort((a,b)=>(b.year||0)-(a.year||0)) },
      { label: "SERIE TV", data: [...series].sort((a,b)=>(b.year||0)-(a.year||0)) },
    ];

    for (const sec of sections) {
      if (!sec.data.length) continue;
      if (y > h - margin - 30) { doc.addPage(); y = margin; }
      doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(139,26,26);
      doc.text(sec.label, margin, y); y += 14;
      doc.setTextColor(30);
      for (const it of sec.data) {
        if (y > h - margin - 20) { doc.addPage(); y = margin; }
        const prefix = it.favorite ? "♥ " : "   ";
        doc.setFont("helvetica","bold"); doc.setFontSize(10);
        const titleLine = `${prefix}${it.title}${it.year?" ("+it.year+")":""}`;
        const titleLines = doc.splitTextToSize(titleLine, w - 2*margin);
        doc.text(titleLines, margin, y);
        y += titleLines.length * 12;
        if (it.directors || it.originalTitle) {
          doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(120);
          let sub = "";
          if (it.directors) sub += it.directors;
          if (it.originalTitle && it.originalTitle !== it.title) sub += (sub?" · ":"") + it.originalTitle;
          const subLines = doc.splitTextToSize(sub, w - 2*margin);
          doc.text(subLines, margin, y);
          y += subLines.length * 11;
          doc.setTextColor(30);
        }
        y += 4;
      }
      y += 8;
    }
    doc.save("cinemino.pdf");
    setMenuOpen(false);
    showToast("PDF esportato");
  };

  const handleImport = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const text = reader.result;
      const trimmed = text.trim();
      const looksJson = trimmed.startsWith("[") || trimmed.startsWith("{");
      try {
        if (looksJson) {
          const parsed = JSON.parse(trimmed);
          const arr = Array.isArray(parsed) ? parsed : (Array.isArray(parsed.items) ? parsed.items : null);
          if (!arr) throw new Error("formato JSON non riconosciuto");
          let imported = 0, skipped = 0;
          const existing = new Set(items.map(i => i.imdbId).filter(Boolean));
          const toAdd = [];
          for (const it of arr) {
            if (!it || !it.title) continue;
            const imdbId = it.imdbId || it.imdb_id || it.imdb || "";
            if (imdbId && existing.has(imdbId)) { skipped++; continue; }
            toAdd.push({
              id: it.id || imdbId || uid(),
              imdbId,
              qid: it.qid || "",
              poster: it.poster || "",
              title: it.title || "",
              originalTitle: it.originalTitle || it.original_title || "",
              year: it.year ? parseInt(it.year) : null,
              directors: it.directors || it.director || "",
              genres: it.genres || "",
              runtime: it.runtime ? parseInt(it.runtime) : null,
              imdbRating: it.imdbRating ? parseFloat(it.imdbRating) : null,
              createdAt: it.createdAt || new Date().toISOString().slice(0,10),
              type: it.type || "Film",
              favorite: !!it.favorite,
            });
            if (imdbId) existing.add(imdbId);
            imported++;
          }
          setItems(prev => [...toAdd, ...prev]);
          showToast(`Importati ${imported}${skipped?`, ${skipped} già presenti`:""}`);
        } else {
          // CSV path
          const rows = parseCSV(text);
          if (!rows.length) throw new Error("vuoto");
          const header = rows[0].map(h => h.trim());
          const idx = (name) => header.findIndex(h => h.toLowerCase() === name.toLowerCase());
          const imdbIdx = idx("Const") >= 0 ? idx("Const") : idx("IMDb ID");
          const titleIdx = idx("Title") >= 0 ? idx("Title") : idx("Titolo");
          const origIdx = idx("Original Title") >= 0 ? idx("Original Title") : idx("Titolo originale");
          const yearIdx = idx("Year") >= 0 ? idx("Year") : idx("Anno");
          const dirIdx = idx("Directors") >= 0 ? idx("Directors") : idx("Regia");
          const genIdx = idx("Genres") >= 0 ? idx("Genres") : idx("Generi");
          const typeIdx = idx("Title Type") >= 0 ? idx("Title Type") : idx("Tipo");
          const runIdx = idx("Runtime (mins)") >= 0 ? idx("Runtime (mins)") : idx("Durata (min)");
          const ratingIdx = idx("IMDb Rating") >= 0 ? idx("IMDb Rating") : idx("IMDb");
          const createdIdx = idx("Created") >= 0 ? idx("Created") : idx("Aggiunto il");
          const favIdx = idx("Preferito");

          if (titleIdx < 0) throw new Error("colonna Title mancante");

          let imported = 0, skipped = 0;
          const existing = new Set(items.map(i => i.imdbId).filter(Boolean));
          const toAdd = [];
          for (let r = 1; r < rows.length; r++) {
            const row = rows[r];
            if (!row || !row[titleIdx]) continue;
            const imdbId = imdbIdx >= 0 ? row[imdbIdx] : "";
            if (imdbId && existing.has(imdbId)) { skipped++; continue; }
            toAdd.push({
              id: imdbId || uid(),
              imdbId,
              poster: "",
              title: row[titleIdx] || "",
              originalTitle: origIdx >= 0 ? row[origIdx] : "",
              year: yearIdx >= 0 && row[yearIdx] ? parseInt(row[yearIdx]) : null,
              directors: dirIdx >= 0 ? row[dirIdx] : "",
              genres: genIdx >= 0 ? row[genIdx] : "",
              runtime: runIdx >= 0 && row[runIdx] ? parseInt(row[runIdx]) : null,
              imdbRating: ratingIdx >= 0 && row[ratingIdx] ? parseFloat(row[ratingIdx]) : null,
              createdAt: createdIdx >= 0 ? row[createdIdx] : new Date().toISOString().slice(0,10),
              type: typeIdx >= 0 ? row[typeIdx] : "Film",
              favorite: favIdx >= 0 ? /^(si|sì|yes|true|1)$/i.test(row[favIdx] || "") : false,
            });
            if (imdbId) existing.add(imdbId);
            imported++;
          }
          setItems(prev => [...toAdd, ...prev]);
          showToast(`Importati ${imported}${skipped?`, ${skipped} già presenti`:""}`);
        }
      } catch (err) {
        console.error(err);
        showToast("Errore nell'importazione: " + err.message);
      }
    };
    reader.readAsText(file, "utf-8");
    e.target.value = "";
    setMenuOpen(false);
  };

  const exportJSON = () => {
    const json = JSON.stringify(items, null, 2);
    downloadBlob(json, "cinemino.json", "application/json;charset=utf-8");
    setMenuOpen(false);
    showToast("JSON esportato");
  };

  const [posterFetchProgress, setPosterFetchProgress] = useState(null);

  const fetchMissingPosters = async () => {
    const missing = items.filter(i => !i.poster && i.imdbId);
    if (missing.length === 0) {
      setMenuOpen(false);
      showToast("Tutte le copertine già presenti");
      return;
    }
    if (!confirm(`Recuperare le copertine per ${missing.length} titoli? L'operazione richiede qualche minuto e fa una chiamata a Wikidata per ogni titolo. Puoi continuare a usare l'app durante il recupero.`)) return;
    setMenuOpen(false);
    setPosterFetchProgress({ done: 0, total: missing.length, found: 0 });

    let done = 0, found = 0;
    // Process sequentially with a small delay to be nice to Wikidata
    for (const item of missing) {
      try {
        const poster = await fetchPosterFromWikidata(item.imdbId);
        if (poster) {
          found++;
          setItems(prev => prev.map(p => p.id === item.id ? { ...p, poster } : p));
        }
      } catch (e) { /* continue */ }
      done++;
      setPosterFetchProgress({ done, total: missing.length, found });
      // Throttle: ~3 req/sec
      await new Promise(r => setTimeout(r, 350));
    }
    setPosterFetchProgress(null);
    showToast(`Recupero completato: ${found} copertine trovate su ${missing.length}`);
  };

  const resetAll = () => {
    if (!confirm("Svuotare la libreria? Verranno eliminati tutti i titoli inseriti. L'azione è irreversibile.")) return;
    setItems([]);
    setMenuOpen(false);
    showToast("Libreria svuotata");
  };

  return (
    <div className="app">
      <Header onMenu={() => setMenuOpen(true)} onAdd={openAdd} />
      <Tabs
        tab={tab} setTab={setTab}
        filmCount={films.length} serieCount={series.length}
      />
      <Toolbar
        query={query} setQuery={setQuery}
        favOnly={favOnly} setFavOnly={setFavOnly}
        sortMode={sortMode} setSortMode={setSortMode}
      />

      {visible.length === 0 ? (
        <div className="no-results">
          {query || favOnly ? "Nessun risultato" : (tab === "film" ? "Nessun film ancora." : "Nessuna serie TV ancora.")}
        </div>
      ) : (
        <div className="list">
          {visible.map(it => (
            <ItemCard key={it.id} item={it} onClick={() => openEdit(it)} onFav={() => toggleFav(it.id)} />
          ))}
        </div>
      )}

      {editOpen && (
        <EditSheet
          initial={editing}
          defaultIsSerie={!editing && tab === "serie"}
          onClose={closeEdit}
          onSave={saveItem}
          onDelete={editing ? () => deleteItem(editing.id) : null}
        />
      )}

      {menuOpen && (
        <MenuSheet
          onClose={() => setMenuOpen(false)}
          onExportCSV={exportCSV}
          onExportPDF={exportPDF}
          onExportJSON={exportJSON}
          onImport={() => fileInputRef.current?.click()}
          onStats={() => { setMenuOpen(false); setStatsOpen(true); }}
          onReset={resetAll}
          onFetchPosters={fetchMissingPosters}
          total={items.length}
        />
      )}

      {posterFetchProgress && (
        <div className="poster-progress">
          <span className="spin"></span>
          <span>Recupero copertine: {posterFetchProgress.done}/{posterFetchProgress.total}</span>
        </div>
      )}

      {statsOpen && <StatsSheet items={items} onClose={() => setStatsOpen(false)} />}

      <input
        ref={fileInputRef}
        type="file"
        accept=".csv,.json,text/csv,application/json"
        style={{ display: "none" }}
        onChange={handleImport}
      />

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

function isSerie(i) {
  const t = (i.type || "").toLowerCase();
  return t.includes("serie") || t.includes("mini");
}

function Tabs({ tab, setTab, filmCount, serieCount }) {
  return (
    <div className="tabs">
      <button className={`tab ${tab==="film"?"active":""}`} onClick={() => setTab("film")}>
        Film <span className="tab-count">{filmCount}</span>
      </button>
      <button className={`tab ${tab==="serie"?"active":""}`} onClick={() => setTab("serie")}>
        Serie TV <span className="tab-count">{serieCount}</span>
      </button>
    </div>
  );
}

function Toolbar({ query, setQuery, favOnly, setFavOnly, sortMode, setSortMode }) {
  const cycle = () => {
    const order = ["recenti", "anno", "alfa"];
    const next = order[(order.indexOf(sortMode) + 1) % order.length];
    setSortMode(next);
  };
  const labelMap = { recenti: "Recenti", anno: "Anno", alfa: "A–Z" };
  return (
    <div className="toolbar">
      <div className="search-box">
        <Icon.Search />
        <input
          type="search"
          placeholder="Cerca titolo, regia…"
          value={query}
          onChange={e => setQuery(e.target.value)}
        />
      </div>
      <button
        className="chip-btn chip-sort"
        onClick={cycle}
        aria-label="Cambia ordinamento"
      >
        <Icon.Sort />
        <span>{labelMap[sortMode]}</span>
      </button>
      <button
        className={`chip-btn ${favOnly?"active":""}`}
        onClick={() => setFavOnly(v => !v)}
        aria-label="Solo preferiti"
      >
        <Icon.Heart filled={favOnly} />
      </button>
    </div>
  );
}

function CardAvatar({ item }) {
  const [failed, setFailed] = useState(false);
  if (item.poster && !failed) {
    return (
      <div className="card-avatar card-avatar-img">
        <img src={item.poster} alt="" referrerPolicy="no-referrer" onError={() => setFailed(true)} />
      </div>
    );
  }
  return <div className="card-avatar">{firstLetter(item.title)}</div>;
}

function ItemCard({ item, onClick, onFav }) {
  return (
    <div className="card" onClick={onClick}>
      <CardAvatar item={item} />
      <div className="card-body">
        <div className="card-title">{item.title}</div>
        {(item.year || item.directors) && (
          <div className="card-meta">
            {item.year && <span className="year">{item.year}</span>}
            {item.year && item.directors && <span className="dot">·</span>}
            {item.directors && <span className="dir">{item.directors}</span>}
          </div>
        )}
      </div>
      <button
        className={`card-heart ${item.favorite?"on":""}`}
        onClick={(e) => { e.stopPropagation(); onFav(); }}
        aria-label="Preferito"
      >
        <Icon.Heart filled={item.favorite} />
      </button>
    </div>
  );
}

function SuggestionPoster({ src, title }) {
  const [failed, setFailed] = useState(false);
  if (!src || failed) {
    return <div className="sugg-poster sugg-poster-fallback">{firstLetter(title)}</div>;
  }
  return (
    <img
      src={src}
      className="sugg-poster"
      alt=""
      referrerPolicy="no-referrer"
      onError={() => setFailed(true)}
    />
  );
}

/* ========== EDIT SHEET ========== */
function EditSheet({ initial, defaultIsSerie, onClose, onSave, onDelete }) {
  const [title, setTitle] = useState(initial?.title || "");
  const [originalTitle, setOriginalTitle] = useState(initial?.originalTitle || "");
  const [year, setYear] = useState(initial?.year || "");
  const [directors, setDirectors] = useState(initial?.directors || "");
  const [favorite, setFavorite] = useState(initial?.favorite || false);
  const [isSerie, setIsSerie] = useState(initial ? /serie|mini/i.test(initial.type || "") : !!defaultIsSerie);
  const [imdbId, setImdbId] = useState(initial?.imdbId || "");
  const [poster, setPoster] = useState(initial?.poster || "");
  const [qid, setQid] = useState(initial?.qid || "");
  const [liveEnabled, setLiveEnabled] = useState(!initial);
  const [suggestions, setSuggestions] = useState([]);
  const [loadingSug, setLoadingSug] = useState(false);
  const [showSug, setShowSug] = useState(false);
  const [fetchingDir, setFetchingDir] = useState(false);
  const [searchError, setSearchError] = useState("");
  const debounced = useDebounced(title, 450);
  const lastQueryRef = useRef(initial ? (initial.title || "").trim() : "");
  const reqIdRef = useRef(0);
  const inputRef = useRef(null);

  useEffect(() => {
    if (!liveEnabled) return;
    const q = debounced.trim();
    if (q.length < 2) { setSuggestions([]); setShowSug(false); setSearchError(""); return; }
    if (q === lastQueryRef.current) return;
    lastQueryRef.current = q;
    setSearchError("");
    setLoadingSug(true);
    setShowSug(true);
    const myId = ++reqIdRef.current;
    searchFilms(q).then(({ results, source }) => {
      if (myId !== reqIdRef.current) return; // stale
      setSuggestions(results);
      setLoadingSug(false);
      if (!results.length) setSearchError("Nessun risultato trovato");
    }).catch(err => {
      if (myId !== reqIdRef.current) return;
      console.error(err);
      setLoadingSug(false);
      setSearchError("Errore di rete, riprova");
    });
  }, [debounced, liveEnabled]);

  const onPickSuggestion = async (s) => {
    setTitle(s.title);
    setOriginalTitle(s.title);
    if (s.year) setYear(s.year);
    if (s.imdbId) setImdbId(s.imdbId);
    if (s.qid) setQid(s.qid);
    if (s.poster) setPoster(s.poster);
    setShowSug(false);
    setSuggestions([]);
    setLiveEnabled(false);
    setSearchError("");
    if (s.directors) {
      setDirectors(s.directors);
    } else if (s.imdbId) {
      setFetchingDir(true);
      const dir = await fetchDirectorFromWikidata(s.imdbId);
      setFetchingDir(false);
      if (dir) setDirectors(dir);
    }
  };

  const onManualSearch = async () => {
    const q = title.trim();
    if (!q) return;
    setLiveEnabled(true);
    setShowSug(true);
    lastQueryRef.current = ""; // force re-run
    setLoadingSug(true);
    setSearchError("");
    const myId = ++reqIdRef.current;
    try {
      const { results } = await searchFilms(q);
      if (myId !== reqIdRef.current) return;
      setSuggestions(results);
      setLoadingSug(false);
      if (!results.length) setSearchError("Nessun risultato trovato");
    } catch (err) {
      if (myId !== reqIdRef.current) return;
      console.error(err);
      setLoadingSug(false);
      setSearchError("Errore di rete, riprova");
    }
  };

  const onTitleChange = (v) => {
    setTitle(v);
    if (!liveEnabled) setLiveEnabled(true);
    if (!v.trim()) { setShowSug(false); setSearchError(""); }
  };

  // close dropdown when clicking outside it (but not when tapping the input or IMDb button)
  useEffect(() => {
    if (!showSug) return;
    const handler = (e) => {
      if (e.target.closest(".input-with-btn")) return;
      setShowSug(false);
    };
    document.addEventListener("click", handler);
    return () => document.removeEventListener("click", handler);
  }, [showSug]);

  const canSave = title.trim().length > 0;

  const submit = () => {
    if (!canSave) return;
    onSave({
      id: initial?.id,
      imdbId: imdbId || initial?.imdbId || "",
      qid: qid || initial?.qid || "",
      poster: poster || initial?.poster || "",
      title: title.trim(),
      originalTitle: originalTitle.trim(),
      year: year ? parseInt(year) : null,
      directors: isSerie ? "" : directors.trim(),
      favorite,
      isSerie,
      genres: initial?.genres || "",
      runtime: initial?.runtime || null,
      imdbRating: initial?.imdbRating || null,
      type: isSerie ? "Serie TV" : "Film",
    });
  };

  return (
    <>
      <div className="backdrop" onClick={onClose} />
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <div className="sheet-handle" />
        <div className="sheet-header">
          <div className="sheet-title">{initial ? "Modifica" : (isSerie ? "Nuova serie" : "Nuovo film")}</div>
          <button className="icon-btn" onClick={onClose}><Icon.Close /></button>
        </div>
        <div className="sheet-body">
          <div className="field">
            <label>Tipologia</label>
            <div style={{display:"flex", gap:8}}>
              <button
                type="button"
                className={`chip-btn ${!isSerie?"active":""}`}
                style={{flex:1, justifyContent:"center", padding:"11px"}}
                onClick={() => setIsSerie(false)}
              >Film</button>
              <button
                type="button"
                className={`chip-btn ${isSerie?"active":""}`}
                style={{flex:1, justifyContent:"center", padding:"11px"}}
                onClick={() => setIsSerie(true)}
              >Serie TV</button>
            </div>
          </div>

          <div className="field">
            <label>Titolo</label>
            <div className="input-with-btn">
              <input
                ref={inputRef}
                className="input"
                value={title}
                onChange={e => onTitleChange(e.target.value)}
                placeholder={isSerie ? "es. Twin Peaks" : "es. Metropolis"}
                autoFocus={!initial}
                autoComplete="off"
                autoCorrect="off"
                spellCheck="false"
                onFocus={() => title.trim().length >= 2 && suggestions.length && setShowSug(true)}
              />
              <button type="button" className="search-btn" onClick={onManualSearch} disabled={!title.trim() || loadingSug}>
                {loadingSug ? <span className="spin"></span> : <Icon.Sparkle />}
                <span>Cerca</span>
              </button>
              {showSug && (
                <div className="suggestions" onClick={e => e.stopPropagation()}>
                  {loadingSug && <div className="sugg-loading"><span className="spin" style={{verticalAlign:"middle",marginRight:8}}></span>Ricerca in corso…</div>}
                  {!loadingSug && searchError && (
                    <div className="sugg-empty">{searchError}</div>
                  )}
                  {!loadingSug && !searchError && suggestions.map(s => (
                    <div key={s.id + (s.qid||"")} className="sugg-item" onClick={() => onPickSuggestion(s)}>
                      <SuggestionPoster src={s.poster} title={s.title} />
                      <div className="sugg-body">
                        <div className="sugg-title">{s.title}</div>
                        <div className="sugg-meta">
                          {s.year || "—"}
                          {s.directors && <span> · {s.directors.length > 40 ? s.directors.slice(0,38)+"…" : s.directors}</span>}
                          {!s.directors && s.stars && <span> · {s.stars}</span>}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
            {fetchingDir && (
              <div className="sugg-dir-fetch">
                <span className="spin"></span> Ricerca regista…
              </div>
            )}
          </div>

          <div className="field">
            <label>Titolo originale <span style={{opacity:.5, textTransform:"none", letterSpacing:0}}>(facoltativo)</span></label>
            <input
              className="input"
              value={originalTitle}
              onChange={e => setOriginalTitle(e.target.value)}
              placeholder={isSerie ? "es. Twin Peaks" : "es. Metropolis"}
            />
          </div>

          {isSerie ? (
            <div className="field">
              <label>Anno</label>
              <input
                className="input"
                type="number"
                inputMode="numeric"
                value={year}
                onChange={e => setYear(e.target.value)}
                placeholder="es. 1990"
              />
            </div>
          ) : (
            <div className="inline-row">
              <div className="field">
                <label>Anno</label>
                <input
                  className="input"
                  type="number"
                  inputMode="numeric"
                  value={year}
                  onChange={e => setYear(e.target.value)}
                  placeholder="es. 1927"
                />
              </div>
              <div className="field" style={{flex:2}}>
                <label>Regia</label>
                <input
                  className="input"
                  value={directors}
                  onChange={e => setDirectors(e.target.value)}
                  placeholder="es. Fritz Lang"
                />
              </div>
            </div>
          )}

          <div className="field">
            <button
              type="button"
              className={`chip-btn ${favorite?"active":""}`}
              style={{padding:"11px 14px"}}
              onClick={() => setFavorite(v => !v)}
            >
              <Icon.Heart filled={favorite} />
              {favorite ? "Tra i preferiti" : "Aggiungi ai preferiti"}
            </button>
          </div>

          {onDelete && (
            <div style={{marginTop:18, paddingTop:14, borderTop:"1px solid var(--line)"}}>
              <button
                className="btn btn-danger-ghost"
                onClick={() => { if (confirm("Eliminare questo titolo?")) onDelete(); }}
                style={{padding:"10px 0"}}
              >
                <Icon.Trash /> Elimina
              </button>
            </div>
          )}
        </div>
        <div className="sheet-footer">
          <button className="btn btn-secondary" onClick={onClose}>Annulla</button>
          <button className="btn btn-primary" disabled={!canSave} onClick={submit}>
            {initial ? "Salva" : "Aggiungi"}
          </button>
        </div>
      </div>
    </>
  );
}

/* ========== MENU SHEET ========== */

  return (
    <>
      <div className="backdrop" onClick={onClose} />
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <div className="sheet-handle" />
        <div className="sheet-header">
          <div className="sheet-title">Menu</div>
          <button className="icon-btn" onClick={onClose}><Icon.Close /></button>
        </div>
        <div className="sheet-body">
          <button className="menu-item" onClick={onStats}>
            <Icon.Chart />
            <div style={{flex:1}}>
              <div>Statistiche</div>
              <div className="menu-item-sub">{total} titoli in libreria</div>
            </div>
            <Icon.Chevron />
          </button>
          <button className="menu-item" onClick={onImport}>
            <Icon.Upload />
            <div style={{flex:1}}>

              <div className="menu-item-sub">JSON di Cinemino o CSV (export IMDb)</div>
            </div>
          </button>
          <button className="menu-item" onClick={onExportJSON}>
            <Icon.Download />
            <div style={{flex:1}}>
              <div>Esporta JSON</div>
              <div className="menu-item-sub">Backup completo</div>
            </div>
          </button>
          <button className="menu-item" onClick={onExportCSV}>
            <Icon.Download />
            <div style={{flex:1}}>
              <div>Esporta CSV</div>
              <div className="menu-item-sub">Per fogli di calcolo</div>
            </div>
          </button>
          <button className="menu-item" onClick={onExportPDF}>
            <Icon.Download />
            <div style={{flex:1}}>
              <div>Esporta PDF</div>
              <div className="menu-item-sub">Elenco stampabile</div>
            </div>
          </button>
          <button className="menu-item" onClick={onFetchPosters}>
            <Icon.Sparkle />
            <div style={{flex:1}}>
              <div>Recupera copertine mancanti</div>
              <div className="menu-item-sub">Cerca su Wikidata per i titoli importati</div>
            </div>
          </button>
          <button className="menu-item menu-item-danger" onClick={onReset}>
            <Icon.Trash />
            <div style={{flex:1}}>
              <div>Svuota libreria</div>
              <div className="menu-item-sub">Elimina tutti i titoli</div>
            </div>
          </button>
        </div>
      </div>
    </>
  );
}

/* ========== STATS SHEET ========== */
function StatsSheet({ items, onClose }) {
  const films = items.filter(i => !isSerie(i));
  const series = items.filter(i => isSerie(i));
  const favs = items.filter(i => i.favorite);

  const byDecade = {};
  for (const f of films) {
    if (!f.year) continue;
    const d = Math.floor(f.year / 10) * 10;
    byDecade[d] = (byDecade[d] || 0) + 1;
  }
  const decades = Object.entries(byDecade).sort((a,b) => a[0] - b[0]);
  const maxDec = Math.max(1, ...decades.map(([,n]) => n));

  const dirCount = {};
  for (const f of items) {
    if (!f.directors) continue;
    for (const d of f.directors.split(",").map(s => s.trim()).filter(Boolean)) {
      dirCount[d] = (dirCount[d] || 0) + 1;
    }
  }
  const topDirs = Object.entries(dirCount).sort((a,b) => b[1] - a[1]).slice(0, 8);

  return (
    <>
      <div className="backdrop" onClick={onClose} />
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <div className="sheet-handle" />
        <div className="sheet-header">
          <div className="sheet-title">Statistiche</div>
          <button className="icon-btn" onClick={onClose}><Icon.Close /></button>
        </div>
        <div className="sheet-body">
          <div className="stats-grid">
            <div className="stat"><div className="stat-num">{films.length}</div><div className="stat-label">Film</div></div>
            <div className="stat"><div className="stat-num">{series.length}</div><div className="stat-label">Serie TV</div></div>
            <div className="stat"><div className="stat-num">{favs.length}</div><div className="stat-label">Preferiti</div></div>
            <div className="stat"><div className="stat-num">{new Set(items.flatMap(i => (i.directors||"").split(",").map(s => s.trim()).filter(Boolean))).size}</div><div className="stat-label">Registi</div></div>
          </div>

          {decades.length > 0 && (
            <>
              <div className="divider-label" style={{padding:"22px 0 8px"}}>Film per decennio</div>
              <div>
                {decades.map(([dec, n]) => (
                  <div key={dec} style={{display:"flex", alignItems:"center", gap:10, padding:"5px 0", fontVariantNumeric:"tabular-nums"}}>
                    <div style={{width:52, fontSize:13, color:"var(--ink-soft)", fontWeight:500}}>{dec}s</div>
                    <div style={{flex:1, background:"var(--line)", height:8, borderRadius:4, overflow:"hidden"}}>
                      <div style={{width:`${n/maxDec*100}%`, height:"100%", background:"var(--accent)", borderRadius:4}}/>
                    </div>
                    <div style={{width:36, textAlign:"right", fontSize:13, color:"var(--muted)"}}>{n}</div>
                  </div>
                ))}
              </div>
            </>
          )}

          {topDirs.length > 0 && (
            <>
              <div className="divider-label" style={{padding:"22px 0 8px"}}>Registi più visti</div>
              <div>
                {topDirs.map(([name, n]) => (
                  <div key={name} style={{display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:"1px solid var(--line)", fontSize:14}}>
                    <span style={{fontFamily:"Fraunces,serif", fontStyle:"italic"}}>{name}</span>
                    <span style={{color:"var(--muted)", fontVariantNumeric:"tabular-nums"}}>{n}</span>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </div>
    </>
  );
}

/* ========== UTIL: download ========== */
function downloadBlob(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}
